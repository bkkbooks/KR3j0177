body:
  text: 硯山齊雜記雜家類四雜品之屬提要臣等謹案硯山齊雜記四卷不著撰人名氏研山為孫承澤齊名或疑即為承澤作然所引查慎行敬業堂詩王士禎居易録等書皆在承澤以後則必不出承澤手考承澤之孫炯有硯山齊珍玩集覽此書或亦炯所撰歟首論六書而附以璽印及刋板告身表文之屬次研說墨譜而附以眼鏡次為銅器考窰器考皆頗足以資考證蓋承澤雖人不足道而於書畫古器則好事賞鑑兩擅其長其所收藏至今為世所重炯承其遺緒耳濡目染具有淵源其所論著一一能詳究始末細别纎微亦足備考索矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:edc86bdf30af095a899e54f06801250888d8e0d21d9bc68273deebf984d77800
