body:
  text: 硯山齊雜記卷二北平孫承澤編書紀學書不可漫為散筆必於古人書中擇百餘字成片段者併其行間布置而學之庶血脈起伏有一種天行之趣久之自書卷軸文字不必界畫算量信手揮之亦成準度所謂目權銖兩者也學書妙在神摹神摹之法將古人真蹟置案間起行繞案反覆逺近不一觀之必已得其揮運用意處若旁立而視其下筆者然後以鋭師追之即未授首亦直薄城下矣摹法書即楮札長短亦須經意求與原者不差分毫方易於追步此無他法一似欲作僞蹟欺人者則無不肖矣近時有善作僞書欺人者亦多有優孟伎倆及其撥置古人自運依然傖父面目此固由其胸次猥瑣不能吸攝古人妙處亦是用意規擬時止求踐成跡不能神而化之消歸自己故也古人作一段書必别立一種意態若黃庭之𤣥淡簡逺樂毅之英采沈鷙蘭亭之俯仰盡態洛神之飄颻凝佇各自標新拔異前手後手亦不相師此是何等境界斷斷乎不在筆墨間得者可不於自己靈明上大加淬治來吾輩學書正如壯兒學手搏豈是不能握拳築脊直是要學其勢耳得勢則跳躍顛撲動能制人死命令旁觀者見其雄逸震蕩以為天地且入其低昻簸弄中竒態溢出矣唐人書法俱從右軍禊帖中各自紬繹而成如伯施得其朗潤信本得其縝密登善得其婉逸公權得其雄邁泰和得其超卓陸柬之趙模則又全體脫出而乏其神駿其不踐迹而天成者顔平原楊景度二人耳精墨乃松液所成又經化鍊輕升滓濁盡去漬以清泉磨以瑩石如膏如露濡毫之餘間用吮吸靈竒之氣透入竅穴久久自然變易骨節澄鍊神明謂之墨仙非虛語也世謂耽書畫者必壽此理也耶梁武帝學佛精兒陶𢎞景神仙宗伯唐太宗英武真君李煜荒淫孱主而皆篤意書法咸有深嗜卓詣蓋由書道中備有真寂𤣥曠與夫雄姿綽態可攝種種根性令其醉心耳米南宫書大小天馬賦有掣銜頓轡不受羈絡之氣山谷注李伯時所寫天間六馬贊矜栗聳峙如就駕鑾輿排仗閶闔蓄千里逺邁之意而不敢逞若坡翁作馬劵與李方叔則髙朗卓犖宛然龍騋步驟延頸顒目以顧草澤之羣三公筆墨變化往往隨事注精以展其妙如此林君復得宛陵葛生所茹筆十餘筒云其中精妙者二三用之如百勝之師橫行楮墨間所向無不如意林書清瘦灑落有雪鶴松猿之韻想見葛生所擅當以圓徑不滯為􅈴耳李陽氷忘歸臺銘篆筆細瘦緣當時用活石鐫刻嵗久漸生刻處幾合石刻而復生天下自有此一種物亦息壤之類也費補之論書貴有節氣畫貴有風味畫之風味易知書何以見有節氣蓋謂㑹古融今靈爽獨運處自備一種徑秀不唯不逐時尚兼亦不隨古人腳根轉耳東坡先生用李廷圭以下至潘谷十三家墨書杜詩十三篇仍各於其下箋名以玩之相與品墨之次第坡公鑒墨極精又手書杜作此卷真墨寶也竟不知落何處耳樂毅論王著所書李白狂草葛叔忱所書絶交書李懷琳所書大字蘭亭叙徐鉉所書江鄰幾云永叔書法筆最弱濃磨墨以借其力故知用墨濃淡燥潤得筆者無不如意右軍英毅卓犖細玩則恬和典雅溢出所謂金玉其相也獻之非不俊邁然芒采四射如八寶中水晶矣米南宫創意為雲山簡古蒼老真有落墨成象之趣敷文即小涉經營其神渾身入水墨中一一運出令人得坐而索其蹊徑也即蘇明允文字沈雄簡徑如負嵎之虎威震毛族子瞻兄弟乃若起而搏擲矣然則此數公即藝事亦居然父子也沈存中云唐太宗力購羲之真蹟唯樂毅論乃右軍親筆於石而鐫之以為家法者昭陵之殉亦以其石便於甃耳後溫韜盜發其石已碎用鐵束之皇祐中髙紳學士之子安世為錢塘主簿存中就其家見之末後獨一海字世又以為蘭亭入昭陵正坐此帖之誤蘭亭開皇中已為祕寶江都隨行久付烈焰蕭翼計賺之說傳竒幻語烏足深信也存中云三館楷書非不精不麗求其好處到死無一筆世所傳樂毅論正是三館楷書耳歐陽文忠公題官奴帖以為皆魏晉人施於家人朋友逸氣餘興初非用意自然可喜後人乃棄百事而以學書為事終老窮年疲敝精神而不以為苦是其可歎然鍾繇嘔心裂被張芝臨池池水盡墨曷常不專精篤志唯其專篤故偶然揮運自成神妙耳文忠此言似無真㑹祝枝山刻陳少陽書草於鎮江郡庠其書言三事一留李文定而黜汪黃一乞下罪已之詔亟罪不進兵之將一請勿幸金陵此書上即日被祻而所刻乃其藁草也山谷擘窠書學瘞鶴銘瘦徑清栗真出鐵石手腕其行押書亦有透絹處沈鷙痛快墨汁透入絹背即襯紙亦可裝潢作玩也樂毅論小中有楷黃庭經楷中有小東方朔畫贊五分中有方丈洛神賦方丈在五分中曹娥碑五分字四分畫力命表三分畫五分字唐太平公主淫縱無檢知愛樂毅論妙蹟則天以織袋貯置箱中授之後為咸陽老嫗竊出竟付竈火唐翰林搨書人劉秦妹善臨寫右軍蘭亭及西安帖張天駿有厮養婢善書觀者嘖嘖嗟賞凡作小楷不可尋常須有法象黃庭經肩有力而腰腳隨風洛神賦頭足用力而胸腹慊然天仙水仙宛然可見樂毅論徑正而遒斂東方朔贊和易而逍遙以寫二賢之情性力命表栁葉溶曳於微風象微臣之遇寵曹娥碑花蕊飄流於駭浪似幼女之捐軀巧畫不能摹雄文不能寫而形容分明可見於翰墨之間此天地之融精鬼神之幹妙所以數帖神護持傳寶百世也唐文皇令羣臣上奏任用真草惟名不得草遂以草名為花押韋陟有五朵雲之目宋施結喜收古人押字類而成書魏晉名蹟梁搜藏皆令朱异懷充沈熾文徐僧權滿賽押縫唐及北宋人往往以押名通書問雖上表章猶或用之近世始施押字於公移以防詐僞而不敢復施於所尊矣余購得蔡君謨手簡實用押名見者疑駭因而落價亦可笑也王右軍書陸機文賦褚河南亦臨之孫䖍禮書揚雄蜀都賦俱有石刻今不甚行漢宦者李巡請於靈帝令蔡雍考定石經書刻於鴻都門古閹宦好學乃過士大夫如此余聞宋光堯手書十三經刻石今雖殘缺尚在杭州府學大成殿兩廡士流未有過而問者經術日衰可歎也米元章論書於道君前曰蔡襄勒字沈遼排字黃庭堅描字蘇軾畫字上復問卿何如對曰臣書刷字世皆不解其何語余為銓注曰勒字顔法也排字歐法也描字虞永法也畫字徐季海法也刷字本出飛白運帚之義意信肘而不信腕信指而不信筆信筆而不信墨揮霍迅疾中含枯潤有天成之妙右軍法也隱然凌轢諸老自占一頭地宗忠簡公留守汴京當金人蹂􅏳之餘百務拮据豈有意營不急者一日於艮嶽遺址得定武禊帖石刻即遣力輦至行在中途為斡里雅布邀截以去後金昌宗以為祕玩蓋右軍秀傑之筆照曜天地不惟蠻貊通知寶愛即􅈴名忠耿之老亦不容屑越於顛沛時也宣城陳氏世傳王右軍求筆帖至唐栁公權與求筆先與二管戒其子曰栁學士如能用當留此不爾退還以常筆與之栁果不能用易常者蓋前二者唯右軍能揮運耳余見栁書大小真蹟皆極雄徑尚未能執筆豈能遽窺山隂堂奧哉書道之不易如此孫過庭書可謂變動之極矣昔人猶以千字一律如風偃草短之何也唐石經多妄加改竄明皇尤喜穿鑿既亂大學次序又刪去顔淵問仁五句孝經刪閨門一章洪範改頗陂二字其注老子吾獨異於人而貴求食於毋乃自詫云本無求於二字實朕所加其敢於妄作如此元大德間錢塘錢國衡刻十種蘭亭筆法咸有異趣南宋內府五十餘種與韓氏羣玉堂賈氏悅生堂本爾時猶有存者故國衡得選其萃耳徐州伎人馬盼學東坡書能得其倣佛坡書黃樓記碑其中山川烟雲字皆盼筆坡笑許之遂劖石不復易漢河南杜子春年且九十能通周官之義鄭衆賈逵往受業焉林孝存以為不驗之書作十論七難以排之何休亦以為隂謀之書康成獨知為聖法故能答其難且序世祖以來通人達士皆有訓詁周官之不廢杜氏力也蜀王楷書藏書數千卷一一皆出親札每趨朝於白藤擔子中寫書書法尤謹孟蜀時毋昭裔少寒微與人借文選不得憤曰吾他日貴當鏤板行之鄭康成博學繞舍生書帶草孫知微畫大慈寺壁流彩所至一院盡生草如錦罽界毬剗去復生誰謂才人筆端為細事耶寫字之義不徒執筆揮運而已蓋有傳寫摸寫傾寫三義秦始皇三十六年每破諸侯寫倣其宫室作之咸陽勾踐破吳范蠡遁去以黃金寫少伯之形而奉之禮器之溉者不寫古今婦人書惟渤海髙氏稍存格度其他即婉弱不勝雖以管仲姬日與魏公薰炙亦不免此李漢老曽詠女子寫字句云雲情散亂未成篇花骨傾欹終帶軟亦實語也偶閲秦淮諸姬與徐範素君宛若各書題此永樂中令翰林習書人朱銓金書金剛經洪熙潜邸令江濬金泥寫佛經成𢎞間尤盛今鬻古者炫飾之悉歸趙魏公矣書家得一好筆如壯士拾一寶刀得一良墨如統軍者受千艘之餉得數行古蹟如行師佩𤣥女兵符趙松雪得米顛壯懷賦闕數行取刻本臨書以補其闕凡易五七次終不如意因歎曰今不逮古多矣蘇滄浪補書懷素自叙前六行細玩亦終似有擬議未混合處元錢塘人李和鬻碑刻為業有印記曰李和鍳定石刻印人或持贋本求印毅然不可彼以販鬻糊口者猶能恪守如是若今日收藏士大夫家熾然作僞以相炫獨何心哉黃庭堅書杜子美兩川䕫峽諸詩刻石眉州想見其句法雄沈書腕歷落之妙恨不得摹取一紙為朝夕之玩黔州有嘉禾堂黃魯直書壁十五字猶在云涪翁晚策杖至此觀江漲雨餘天欲凉今世所傳石經乃僞蜀相毋昭裔捐俸令張德釗依唐太和本寫宋元祐中白元均補公羊榖梁二傳宣和間席升獻又刻孟軻書范成大又云孝經論語爾雅廣政甲辰張德釗書周易辛卯嵗楊鈞孫逢吉書尚書周德正書周禮孫朋吉書毛詩禮記儀禮張紹文書左氏傳不知何人書皆蜀士筆也今人見其楷法類虞褚疑為唐人未之考耳黃魯直云老夫之書本無法也但觀世間萬緣如蚊蚋聚散未嘗一事橫於胸中故不擇筆墨遇紙則書紙盡則已亦不計工拙與人之品藻譏彈譬如木人舞中節拍人歎其工舞罷又蕭然矣宋嚴羽卿論詩姜堯章論書皆精刻深至具有卓見及所自運顧逺出諸名家後大抵議論與實詣確然兩事議論者識也實詣者力也力旺者能蔑識識到者又能消力語云識法者懼每多拘縮天趣不得泛溢也觀白石書詠滄浪詩自當得之漢魏以來圖書竒蹟梁元帝裒集極多江陵之亡盡付烈焰陳隋稍稍搜聚至煬帝益富立二臺禁中一藏古物一藏法書名繪江都之遊連艫自隨宇文變起倉卒亦踵梁轍與寶玉俱焚唐文皇篤意翰墨購訪日盛祕府所緘固充牣也武后專制寵臣張易之奏請裝治因令善工密為摹肖竊其真者自藏於家易之被誅薛稷取去稷敗為惠文太子隆範得之而終焚於火宋淳化所刻不知經幾畨脫塹矣善學者不可出手眼神而明之以索古人於象外乎蔡卞日臨蘭亭一過東坡聞之曰從是證入豈能超勝蓋隨人腳跟轉終無自展步分也唐人臨蘭亭各自出一種意度右軍平日自書又每種叧出一意度非有意求異以八法精熟融爛胸中隨地出之如水波雲葉初無定質可泥耳唐人崇事法書其治書有四種曰臨曰摹曰搨響曰硬黃臨者置紙法書之傍睥睨纎濃㸃畫而倣為之摹者籠紙法書之上映照而筆取之響搨者坐暗室中穴牖如盎大懸紙與法書映而取之欲其透射畢見以法書故縑色沈暗非此不徹也硬黃者嫌紙性終帶暗澀置之熱尉斗上以黃蠟塗勻紙雖稍硬而瑩徹透明如世所為魚枕明角之類以䝉物無不纎毫畢見者大都施之魏晉鍾索右軍諸蹟以其年久本暗又所宗師故極意取之也臨書如雙鵠並翔各極其致不必為步驟之拘非於書有深詣者不能也以故屬之虞褚諸公以下三者則趙模馮承素輩職耳宋黃伯思東觀餘論辨駁古今法書最為精刻乃其辨黃庭經一節實缺詳審伯思曰黃庭經帖為逸少書僕考之非也按陶隱居真誥翼真檢云晉哀帝興寧二年南嶽魏夫人所授惟有黃庭經一篇得存蓋此經也逸少以穆帝升平五年卒後二年為興寧二年此經始降逸少安得預書之又按梁虞和論書表云山隂壜釀村養鵝道士謂羲之曰久欲寫河上公老子縑素已具無人能書府君能自屈書兩章便合羣以奉羲之為停半日寫畢攜鵝去晉書本傳亦著是說然隱居與梁武啓又云逸少有名之蹟不過數首黃庭勸進樂毅等不審猶有存否蓋此啓在著真誥前未之考耳而李太白乃有黃庭換白鵝之句相習之謬也伯思自以為至當矣不知右軍寫道德經換鵝又寫黃庭經換鵝自是兩畨事而太白詩亦兩見一云右軍本清真瀟灑出風塵山隂遇羽客愛此好鵝賔掃素寫道經筆精妙入神書罷籠鵝去何曽别主人一云鏡湖清水漾晴波狂客歸舟逸興多山隂道士如相見應寫黃庭換白鵝實互用之也考道藏黃庭有數種有內景黃庭有外景黃庭又有黃庭遁甲緣身經黃庭玉軸經魏夫人所出乃內景一種係楊真人羲寫其外景經老君所作先出行世右軍所書兩不相溷也張懷瓘書斷張彥逺法書要録並載右軍書黃庭六十行褚遂良右軍書目黃庭經書與山隂道士其時真蹟自在又武平一徐氏法書記親在禁中見武后曝書太宗所遺者六十餘函有黃庭何所復疑哉他人無誤正伯思自誤耳北齊淮南經略使辛術於廣陵獲得傳國璽送於鄴文宣以璽告於太廟此璽即秦所制方四寸上紐交盤龍文曰受命於天既夀永昌二漢相傳又歷魏晉晉懷帝敗沒於劉聰聰敗沒于石氏石氏敗晉穆帝永和中濮陽太守戴僧施得之遣督護何融送於建業歷宋齊梁梁敗侯景得之景敗侍中趙思賢以璽授景南兖州刺史郭元建送于術故術以進焉術少愛文史晚更勤學雖在軍旅手不釋卷及定淮南凡諸資物一毫無犯唯大收典籍多是宋齊梁時佳本鳩集萬餘卷并顧陸之徒名畫二王以下法書數亦不少杭州邵皇親墳吳越時法因寺基也後山壁上有司馬溫公篆家人卦遒徑可觀趙文敏善用筆所使筆有宛轉如意者輒剖之取其精毫别貯之凡萃三管之精令工總縳一管則真草巨細投之無不可終嵗任之無敝矣故公書㸃畫如碾玉鎚金無纎毫遺憾也寫數字必須蕭散神情吸取清和之氣在於筆端令揮則景風灑則甘雨引則飛泉直下鬱則怒松盤糾乍疾乍徐忽舒忽卷按之無一筆不出古人統之亹亹自行胸臆斯為翰墨林中有少分相應處也荀輿能書嘗寫狸骨治勞方右軍臨之至今謂之狸首帖王平南廙右軍之叔也善書畫嘗言吾諸事不足法惟書畫可法後晉明帝師其畫王右軍學其書梁武教諸王書令殷鐵石于大王書中搨一千字不重者每字片紙雜碎無序武帝召周興嗣集句成韻一夕編成鬢髮皆白右軍孫智永禪師自臨八百本江南諸寺各留一本王右軍先諱正故法帖中謂正月為一月為初月其他正字率以政代之山谷云右軍似左氏大令似莊周學書執筆有髙下虞永興云筆長不過六寸真一行二草三指實掌虛歐陽文忠云豫書常使腕運而指不知鄭子經云小字法在掌指大字法兼肘腕魏晉間帖掌指字也昔人云顔魯公學不如其人于麻姑壇記見之詞不如筆楷不如行有意不如無意于爭坐位帖見之晉人書法在態中故圓而多逸唐人態在法中故方而多遒宋初諸人猶遵唐矩至四大家而唐法盡變競為傾側矣虞伯生云坡谷出而魏晉之法盡米元章薛紹彭黃長睿方知古法又云長睿書不逮言惟紹彭最佳而世遂不傳紹彭號翠微居士其父師正重摹定武蘭亭其子嗣昌刻智永千字文蓋世有書學者金人王庭筠與趙秉文党懷英同負書名秉文號閒閒居士九江碑工李仲寧工于刻字崇寧初詔郡國立黨人碑仲寧不肯刻曰小人家舊貧窶賴開蘇內翰黃學士詞翰遂至溫飽今以為奸不忍下手時論賢之山谷草書青蓮秋浦歌一卷後自跋云已所作草書舉世並謂佳獨錢穆父以為俗反自思省盡改去俗則世人見之則又不謂佳嗟乎去俗之作安能責俗人賞識此政宜世人不識為佳王子敬有言外人那得知誠然矣朱巨川告身一為顔魯公書一為徐季海浩書巨川以試評事兼縣令别無功德表見止以名蹟之垂照耀千古米元章書從褚登善悟入登善深于蘭亭為唐人秀穎第一宋髙宗嘗以蘭亭賜太子令寫五百本更換一本十七帖硬黃本汝陽王思延得于燕都濟南邢子願借之摹勒上石米襄陽好書天馬賦其最得意為擘窠大字後題云為平海大師書後園水丘公觀後有黃子久諸人題跋子久云展視之時有大星貫斗而墜其聲如雷栁誠懸有小楷清靜經云真護命經宋搨下真蹟一等嘉禾項氏又藏其度人經真跡精妙絶倫宋人閣帖不入顔平原蓋顔書宋初不甚宗尚至蘇黃諸公始知推尊如子長史記晉魏皆不甚行而班掾最著古人精神發露故有時也文待詔每旦必書千文一卷黃山谷曰心能轉腕手能轉筆書字便如人意古人工書無他異但能用筆耳又曰余嘗評書字中有筆如禪家句中有眼如右軍如涅槃經說伊字具三眼也又曰用筆之法欲雙鈎回腕掌虛指實以無名指倚筆則有力古人學書不盡臨摹張古人書於壁間觀之入神則下筆時隨人意又曰筆力同中有異異中有同後百年如有别書者乃解余語耳張長史折叉股顔太師屋漏㾗王右軍錐畫沙印印泥懷素飛鳥出林驚蛇入草索靖銀鈎蠆尾固是一筆心不知手手不知心法耳又曰肥字須要有骨瘦字須要有肉古人學書學其工處今人學書肥瘦皆病又嘗偏得其人醜惡處如今人作顔體乃其可慨然者東坡先生云真書難于飄揚草書難于嚴重大字難于結密而無間小字難于寬綽而有餘趙子固孟堅云學晉必從唐入則有間架墻壁僅有三焉化度九成廟堂耳三書之法平正恬淡分間布白行筆停勻不可使一髙一低一斜一欹少涉世俗俗之從生始于徐浩為書須戒徐㑹稽之濁李北海之狂濁在跛偃狂在欹斜魯公之正其流也俗誠懸之徑其流也寒態度者書法之餘骨格者書法之祖草書雖連綿宛轉然須有停筆惟大令綰秋蛇為文皇所譏至旭素始作連綿此黃伯思簡齊堯章所不取也要之晉人之妙不在此法度端嚴中蕭散為勝耳翟伯壽問書法於米老曰無垂不縮無往不收姜堯章曰字法真多用折草多用轉折欲少住住則有力轉欲不滯滯則不遒然而真以轉而益遒草以折而後徑不可不知也書以疏為風神密為老氣遲以取妍速以取徑藝之至未始不與精神通其說見於昌黎送髙閒上人序虞伯生云米氏父子書最盛行舉世學其竒怪不惟江南為然金朝有用其法者亦有善書得名而流弊南方特盛遂有于湖之險至于即之之惡謬極矣白鹿峯陸樗自歎有蘭亭癖顔平原云張長史雖天姿超逸妙絶古今而楷法精詳特為真正余見長史草書墨蹟獨其楷書即古帖中亦未見之研北雜志云姜堯章作絳帖評旁證曲引有功于今古趙子固目姜堯章為書家申韓顧信字善夫居太倉善筆扎從趙文敏公逰每得文敏書即鑱諸石置一亭中扁曰墨妙文敏為其好學樂為之書嘗為杭州軍器局提舉右軍去郡之後有告墓帖既避王述遂終不出然蘭亭黃庭皆在爾時始出米芾所謂右軍妙蹟去郡方佳書家矜式宜寶蘭亭至於聖教序宋人謂為院體専書官誥趙子固言其逸筆處不知懷仁從何取入使後人未倣羲帖先為此俗態觀之可惡陸子淵云蘭亭無下搨蓋正本既佳得其一枝半節皆可名世智永書千字文八百本其真蹟舊在江西袁簡肅家㑹稽董仲舒家又有不全本在董思白家若刻本則薛氏刻於大觀中余曽見彼時初搨唐文皇裝潢鍾王真蹟以上者居前下者居中中者居後米元章云褚臨蘭亭少長字世傳衆本皆不及長字其中二筆相近後捺筆鈎回筆鋒直至起處懷字內折筆抹筆皆轉側偏而見鋒暫字內斤字足字轉筆賊毫隨之于斫筆處賊毫直出其中世之摹本未嘗有也東坡作書于卷後餘數尺曰以待五百年後人作跋司馬溫公與范忠宣書一卷宋景濓題云閲此帖者當知治亂之機所係初不可以尋常簡牘視之也鍾繇摹正考父鼎銘字大如拳非分非篆紙則蟲剝蝕盡獨字墨不剝署云庚午五年九月鍾繇摹後有唐太宗宋徽宗理宗元皇慶四御跋蘭亭叙六朝時已有石刻今尚有開皇本是隋時所刻唐文皇見刻本遂訪真蹟於越州辨才得之命湯普徹馮承素褚遂良歐陽詢各摹一本原與隋本相似至宋始獨稱定武為歐陽詢摹下真蹟一等羣公聚訟緣此而起沈存中云唐太宗力購羲之真蹟唯樂毅論乃右軍親筆於石而鐫之以為家法者昭陵之殉亦以石便於甃耳後溫韜盜發其石已碎用鐵束之皇祐中髙紳學士之子安世為錢塘主簿存中就其家見之末後獨一海字李君實云十年前贖得一本正海字獨留本其闕處有叙書修字數個蓋歐陽文忠再拓本也王獻之保毋帖乃親書於甎而刻之右軍快雪時晴帖舊在元內府延祐五年出示羣臣令劉賡趙孟俯圖卜德勒題跋相傳此為右軍正書今在真行之間米老亦有此疑徐文長渭云臨摹蘭亭者多矣然時時露已筆意者始稱髙手王平南廙得索靖書一紙永嘉喪亂乃四疊於衣中以渡江虞世南奏草真蹟中云伏蒙聖慈以臣進呈孔子廟堂記石本特賜臣晉右將軍王羲之黃銀印一顆臣已祇受唐人書歐虞褚薛皆有蹊徑學之輒易肖似惟顔魯公正書易學行書難摹如爭坐位祭侄文乞米帖鹿脯帖馬病帖送明逺太沖贈裴將軍皆宗右軍而風神絶類立於不測令人轉逺眉山詩曰吾雖不善書曉書莫如我茍能通其意常謂不學可貌妍容有嚬璧美何妨撱端莊雜流麗剛健含婀娜數語極書家妙境昔人云羲之五十書成黃山谷亦自紹聖乙亥謫黔中得藏真自序于石陽林宗落筆頓覺超異時五十餘矣老而好學猶足名世書此自針無以年自棄也王文安英題朱子墨蹟云常讀文公先生書字銘曰握管濡毫伸紙行墨一在其中㸃㸃畫畫又曰放意則荒取妍則惑必有事焉神明厥德夫書六藝之一也學者之餘事而有至理寓焉去古既逺世之學書者以姿媚妍麗為工而所書者則又多艷辭俚語無益於世是以先生之所謂一者敬也敬存於心則不至於荒惑而書之體自得有事於此乃能神明其德先生於書其敬且爾在他人可不慎哉書史㑹要王曠導從弟與衛氏為中表故得蔡雍書法于衛夫人以授子羲之則是右軍父子皆經衛指授也衛受筆法于蔡琰書法之傳在二女子亦自一竒古來奸雄多工書如李斯趙髙曹操鍾㑹劉曜王敦桓溫劉裕劉毅桓元郤超朱溫之屬下至盜賊亦有之梁虞和論書表云盧循素善尺牘尤珍名法西南豪士咸慕其風劇賊乃亦嫻此真可怪也戴若思亦工書虞又云謝靈運母劉氏子敬之甥故靈運能書而特多王法昔人云王氏例能書謝氏例能詩按謝氏自文靖廋肩吾書品列中之上已來尚奕萬晦敷方明靈運惠連綜靜朓藻皆擅書名乃至道韞亦云善書知前賢未為篤論也謝氏蘭玉集自安石厯梁陳凡作者十六人吳興江聞序安石移葬長興之九鴉岡見吳興掌故集世嗤奴書為不足貴法帖中如吳琚之學米元章王詵之學蘇東坡俞紫芝之學趙松雪錢溥之學宋仲溫黃省曽之學祝枝山俱能入其室亦稱甲觀然則師法前人亦學者所不廢但欲得其神理即可傳耳至吳原博之學東坡竟無一筆不似亦不能出其範圍迄今原博書猶人所共珍也米元章一帖曰草不可妄學黃庭堅而魯直集中有答僧書云米元章書公自鑒其如何不必同蘇翰林元論也乃知二公書素不相可如此見却掃編文海披沙記筆之異者鍾繇張芝王右軍皆用鼠鬚歐陽蘭臺用貍毛為心蕭祭酒用胎毛為柱張茂先用鹿毛陶隱居用羊鬚鄭䖍謂麝毛一管可書四百紙貍毛可書八百紙又有豐狐䖮蛉龍筋虎僕及猩猩毛狼毫雖竒品而醇正得宜不及中山免毫若淇泉之鴨毛雀雉毛但取五色相間為觀美耳曹李志與右軍同時亦能書南唐王文秉工小篆自號王逸老意欲與逸少相抗皆以其人偎瑣世不與其書名東坡居士從遊者尚有髙述潘岐以人品平平不得與秦朝張同稱今人不能自樹徒知攀附勝流竟何益耶唐張旭以草聖名世畫墁録云長安府録㕔有唐吏部郎官題名碑張長史書序楷法整若軍陳云云世言張長史書法傳顔魯公觀此信然韻語陽秋云米元章書畫竒絶從人借古本自臨搨臨竟并臨本真本還其家令自擇其一其家不能辨也以此得古人書畫甚多東坡屢有詩譏之錦囊玉軸來無趾粲然奪真疑聖智又云巧偷豪奪古來有一笑誰似癡虎頭人之嗜好耽著乃至於此元章嘗欲以九物換劉季孫子敬帖不獲其意歉然張藝叟作詩云倩君出竒帖與此九物併今日投汴水明日到滄溟可以警膏肓於書畫者詩話總龜云東坡跋元章所收書畫地為餅未必似要令癡兒出饞水山谷和云百家傳本略相似如日行天見諸水又云拙者竊鉤輒斬趾皆譏元章患淨病及好奪取人書畫語唐僧智永為王右軍七世孫皎然為謝康樂十世孫二僧詩字名家不忝其祖學書與學畫不同學書有古帖易於臨仿即不必宋唐石刻隨世所傳形模輒似趙集賢云昔人得古帖數行専心學之遂以名世或有妙指靈心不在此論矣畫則不然要須醖釀古法落筆之頃各有師承略涉杜撰即成下劣不入具品况於能妙大觀帖宋徽宗以閣帖摹本出王著手未為精確詔龍大淵等重將禁中所藏真蹟刻石標題官閥亦有改定蔡元長之筆也評書者謂在淳化帖之上好古之家每得一二卷以為竒寶蘭亭無下搨謂其真蹟既竒絶摹刻雖失真亦各有所近如得肉得骨之論但定武唐本得其神耳秦中石刻流傳於上黨者娟秀溫潤當是褚河南所摹未知王順伯尤延之曽經辨論否然右軍風神宛然可想老米研山易薛紹彭甘露莊既易復請見靳固不出米老詩云雖有玉蟾蜍向豫頻淚滴紹彭真忍人哉宋人名手作獨樂園圖與􅜁川嵩草堂並傳畫苑㸃綴司馬君實許大富貴相當時實止一畝居耳園無廣狹相也白香山自謂東都有美酒者無不造有名園者無不遊圖無人我相也維摩居士毗邪文室攝取三千世界如陶家輪忽復不見是有無相亦不可得也澄清堂李後主所刻石賀知章所摹五代時朱溫之子亦刻石所謂貞明帖也宋太宗因之以刻淳化閣帖王著摹手頗癡肥多肉失賀監之意雖聲價最髙不堪並視有膚清神清之辨矣宋時聚訟定武蘭亭有損本不損本五字七字之辨近世於聖教序亦然若唐石唐拓流傳海內者未嘗一見所見唯宋搨唐石耳而紛糾何以顯五字無有完善內至於出二字蹤跡俱不可尋矣智永為虞世南師作永師書當思永興用筆乃不笨鈍作虞書當思永師用筆乃不板結趙文敏六體千文惟楷書絶類智永蓋以虞伯施參合為之遂為古今之絶王雅宜學虞不免奴書之誚文太史日寫智永千字文一本字形頗相肖而筆稍偏矣蘭亭叙為宋人聚訟此實右軍真血脉然王順伯尤延之諸人專重定武一刻無論定武難致果如趙子固捨命寶之日夕臨倣亦有禪家從門入者不是家珍之喻巖頭云須一一自己胸中流出蓋天蓋地去始是了手山谷云世人但學蘭亭面欲換凡骨無金丹真篤論也陸文裕公跋云蘭亭無下搨蓋正本既佳得其一枝半節皆可名世栴檀之林必無雜樹黃要叔父子寫生頗費時日白石翁以頃刻工力敵之而氣韻生動神采煥發所謂以少許勝人多多許其於連城之賞則均耳逸品在神品之上信然董華亭書坡公大江詞即以其筆法書之米元章謂東坡畫字趙子固又云偃筆之病誤我蘇公然山谷有云子瞻書為今代第一挾以文章妙天下忠義貫日月之氣自非書家所能爭長也山谷老人得筆於瘞鶴銘又參以楊凝式骨力其欹側之勢正欲破俗書姿媚昔人云右軍如鳯翥鸞翔跡似竒而反正黃書宗㫖近之蓋兄事蘇而弟蓄米自負不小唐貞觀時楞嚴猶未經翻譯永興破邪論亦世諦流布耳顔魯公頗事道言李北海但作碑版懷素著袈裟犯飲酒戒草書狂縱不足與寫經手較量功德唐世學書甚盛皆不為釋典所用梁肅房融其書不稱惟裴休深於內典兼臨池之能淳熙帖所刻是已至蘇黃兩公大以翰墨為佛事書不及唐其深心般若故當勝也古人書皆以竒宕為主絶無平正等勻態自元人遂失此法余欲集閣帖中最可見者作一書譜所謂字如算子便不是書搖筆便當念此自然超乘而上書家好觀閣帖此正是病蓋王著輩絶不識晉唐人筆意専得其形故多正局字須竒宕瀟灑時出新致以竒為正不主故常此趙吳興所未夢見者唯米癡能㑹其意耳今當以王僧䖍王徽之陶隱居大令帖幾種為宗餘俱不必學月儀帖本出索靖後多散逸不傳此多唐人擬作者筆法亦宗索靖其虛和夭嬌間有豹奴遺意大都為章草者必兼右軍乃合不則宋刻輩耳臨帖如驟遇異人不必相其耳目手足頭面當觀其舉止笑語真精神流露處莊子所謂目擊而道存者也楊羲黃素黃庭經真蹟趙文敏有長歌乃其所藏也楊書以郗氏為師不學右軍父子然翩翩有冲霄之度實自餐霞服氣中來非臨池工力所能庶幾也米元章待訪録云六朝人書無虞褚習氣內景經全在筆墨畦徑之外其為六朝人得意書無疑今人作書只信筆為波畫耳結構縱有古法未嘗空用筆也善用筆者清徑不善用筆者濃濁不獨連篇各體有分别一字中亦具此兩種不可不知也書家以分間布白謂之九宫元人作書經云黃庭有六分九宫曹娥有四分九宫是也信本千文真有完本具於胸中若構凌雲臺一一皆劑而成者米南宫評其真書到內史信矣欲學書者先定間架然後縱橫跌宕惟變所適耳孫過庭云既得平正須追險絶書為工惟顔行與景度草得之景度好題寺壁不甚書縑素即宣和所收亦復寥寥蘇米皆學其書故每多推重東坡先生少學蘭亭故其姿媚似季海至酒酣意忘工拙字特瘦徑乃似栁誠懸筆圓而韻勝挾文章妙天下忠義貫日月之氣東坡云詩至於杜書至於顔能事畢矣然如畫家評畫神品在逸品之下以其費盡工力失於自然而後神也真誥云仙官皆有職事不如仙人之未列等級者為遊行自在書畫皆然即顔書最傳為祭侄爭坐位乞米帖皆無矜莊天真爛漫故楊少師李西臺蘇黃蔡君謨皆宗之也惲氏說畫小記南宗以唐王摩詰維荆洪谷浩為祖開文人筆墨游戲法後至董源號北苑南唐人髙逸沈古元四大家皆宗之黃公望字子久號大癡又號一峯最近巨然巨然北宋僧亦師北苑者也故今稱董巨但一峯用正峯長皴數筆則得自北苑也倪瓚元鎮號雲林又號迂翁學北苑兼洪谷意所以獨逸在三家上吳鎮仲圭號梅花道人獨得北苑墨葉兼巨公之長最為沈鬱黃鶴山樵王蒙叔明初師北苑後兼摩詰細麻皮皴極鬱密渾厚其用墨意不離北苑要之黃倪吳王四家總出北苑而各不相似所以能髙自立家若如出北苑一手縱極肖已落第二乘矣豈能與北苑並傳不朽者乎如近世王紱楊基張羽徐賁皆以筆墨游戲得元人意致亦各成家文徴明沈周仇英唐寅未嘗相襲而董宗伯其昌復宗北苑繪苑風流賴以復振云北宗以南宋劉李馬夏為標表劉松年李唐馬逺夏圭四家各有竒妙李晞古境界極險然命筆太刻畫至於開闢奧僻一路使人不可到劉極精工然不及李馬逺畫人間傳者絶少淡蕩蕭曠之趣間于殘軸斷幅中得之夏禹玉筆墨最為深沈又極靈秀創境亦髙竒但所畫皆浙中山水耳世傳北宗以唐李思訓昭道父子為祖即世號大小李將軍者俱極工整麗密之致由劉李馬夏輩觀之豈復有二李遺意耶故北宗以李將軍論則可謂衣鉢失傳者矣余因斷自劉李馬夏始近人言北宗者惟仇唐仇不及唐之髙秀而精工之極又得士氣此最不易得在浙則戴靜庵文進逺宗馬夏然視仇又千里矣因歎息久之暇日偶與正叔論畫遂記其語唐荆浩畫山水賦凡畫山水意在筆先逺人無目逺樹無枝逺山無皴隱隱似眉逺水無波髙與雲齊此其訣也山腰雲塞石壁泉塞樓臺樹塞道路人塞石分三面路看兩蹊此其法也凡觀山水先看氣象後辨清濁逺山不得連近山逺水不得連近水山腰回抱寺觀可安斷岸頽堤小橋可置凡作林木逺者疏平近者森密有葉者枝柔無葉者枝硬生于土者修長而挺直長于石者拳曲而伶仃古木節多而半死寒林扶疏而蕭森山形不得重犯樹頭不得整齊山借樹為衣樹借山為骨樹不可繁要見山之秀麗山不可亂要顯樹之精神畫謝在杭五雜俎曰自唐以前名畫未有無故事者蓋有故事便須立意結構事事考訂人物衣冠制度宫室規模大略城郭山川形勢向背皆不得草草下筆非若今人任意師心鹵莽滅裂動輒託之寫意而止也張僧繇展子䖍閻立本輩皆畫神佛變相星曜真形至如石勒竇建德安祿山有何足畫而皆寫其故實其他如懿宗射免貴妃上馬後主幸晉陽華清宫避暑不一而足上之則神農播種堯民擊壤老子度關宣尼十哲下之則商山採芝二疏祖道元達鎖諫葛洪移居如此題目今人郤不肯畫而古人為之轉相沿倣蓋繇所重在此習以成風要亦相傳法度易於循習耳古圖既不可見尚有散見其名目於載籍中者如曹不興元女授黃帝兵符圖宋炳獅子擊象圖張僧繇漢武射蛟圖衛協穆天子宴瑶池圖周昉楊妃架雪衣女亂雙陸圖燕文貴七夕夜市圖葉仁遇淮陽春市圖王士元緑珠墜樓圖任才仲四更山吐月圖劉宗道照盆孫兒圖李伯時嫁小喬圖無名氏佳人寒食圖趙子昻管夫人烹茶圖周通李陵送蘇武圖何霸瀟湘逢故人圖唐人村田暝歌圖任南麓玉環並轡圖宋人美人却扇圖張萱虢國夫人夜逰圖按其名目尚恍惚若見於目中使人飛動不能自己况覩其真蹟乎董華亭常言名畫不必驟見夢見三四度而後見之始佳豫謂更不得見亦正佳畫家畫古人圖像皆須考其時代如冠舄衣褶車服之類一有踳誤杜纂後人得而指之詩賦亦然宋史繩祖學齊占畢稱杜牧阿房宫賦煙斜霧橫焚椒蘭也二句尤不可及謂六經止以椒蘭為香楚辭言椒漿蘭膏亦然若沈檀龍麝等字皆出於西京以後近世文士作媫妤怨明妃曲而引用梅裝蓮步更為可笑此皆齊梁間事漢時寧有之邪吳道子畫鍾馗手捉一鬼以右手第二指抉鬼眼時稱神妙或以進蜀主孟昶甚愛重之一日召示黃筌謂曰若以拇指搯鬼眼更有力試改之筌請歸數日看之不足以絹素别畫一鍾馗如昶指并吳本進納昶問之對曰道子所畫一身氣力色貌俱在第二指不在拇指今筌所畫一身氣力意思併在拇指是以不敢輒改此雖論畫實詩文之妙訣讀史記漢書須具此識力宋徽宗崇寧三年立畫學考畫之等以不倣前人而物之情態形色俱若自然筆韻髙簡為工此近於空摹之格至今尚之居易録宗姪茂京原祁為豫倣荆關董巨倪黃諸大家山水小幅十幀真元人得意之筆又自題絶句多工其二云蟹舍漁莊略彴邊栁絲荷葉鬬清妍十年零落荒園景倣佛當時趙大年西田園橫岡側面出烟鬟小樹周遮雲往還尺幅巒容寫荒率曉來剪取富春山大癡富春山嶺一日秋雨中茂京攜畫見過因極論畫理其義皆與詩文相通大約謂始貴深入既貴透出又須沈著痛快又謂畫家之有董巨猶禪家之有南宗董巨後嫡派元惟黃子久倪元鎮明惟董思白耳豫問倪董以閒逺為工與沈著痛快之說何居曰閒逺中沈著痛快惟解人知之又曰仇英非士大夫畫何以聲價在唐沈之間徴明之右曰劉松年仇英之畫正如溫李之詩彼亦自有沈著痛快處昔人謂義山善學杜子美亦此意也王翬字石谷自號烏目山人常熟人畫與太倉王太常時敏王亷州鑑齊名江左稱三王辛未來京師頗自貴重其畫不為人作特作長幅及冊子八幅相遺其意濃至可感竹垞題冊後云王翬老去畫尤工小幅吳裝倣惠崇曽上北髙峯頂望村村風景似圖中八幅其一倣大癡溪山雨意圖一倣王叔明小景一題夕陽山外山倣巨然一倣趙吳興采菱圖一倣北苑一倣黃子久天池石壁圖一寫唐伯虎詩意詩云吳山多近打魚磯磯上家家住翠微曉日三竿人未起查查山鵲繞簷飛又十月江南未隕霜青楓欲赤碧梧黃停橈坐對西山晚新雁題詩小著行溪山漁釣一軸趙松雪畫故相國真定梁公家物也松雪自題詩云桑苧未成鴻漸隱丹青聊作虎頭癡久知圖畫非兒戲到處雲山是我師溪上先人之敝廬南山秀色照庭除何時共買扁舟去看釣寒江縮項魚晉齊識見超卓久興僕客京師情因洽甚今晉翁先得歸鄉將與青山為主賔漁釣以自適僕情為之慙於其行畫此以寄意且為後㑹之故事云元祐中舒州有李亮工以文鳴與蘇黃遊又有李元中字畫之工追蹤鍾王與李伯時號龍眠三李同年登進士出處相若今人但知伯時而已唐詩人人多慕而寫之傳于畫圖如王右丞畫孟浩然吟詩圖之類故白太傅詩云兼聞好事者畫我作屏風前蜀房從真嘗畫常建冒雪入京圖見圖繪寶鑑唐詩人以畫名家者首薛稷王右丞次鄭䖍顧况張志和張諲劉商圖繪寶鑑云劉方平工山水樹石汧國公李勉甚重之又李林甫善山水類昭道昭道思訓之子林甫思誨子蓋從兄弟也人知滕王元嬰善作蜂蝶不知嗣滕王湛然亦善畫花鳥蜂蝶官至太子詹事吳越王錢鏐善墨竹畫家有兩李營丘北宋李成人皆知之南宋李永亦稱營丘知之者殊少太原王稚登云李營丘以山水擅名為宋畫院第一謂永也古人一藝亦有家學翟伯壽籀史云李伯時父虛一喜藏法書名畫伯時自少好之遂悟古人用筆宋僧智永成都人工小景長於傳摹宛然亂真唐智永以書名此以畫名黃鶴山樵畫欵或作王子䝉又或作叔銘夏圭雪江歸棹卷於浦溆曲港間作麂眼短籬叢竹蒙茸雪屋數椽掩映林薄極荒寒之趣唐太宗嘗與侍臣泛舟春苑池中見異鳥容與波上悅之召閻立本圖其狀閣外傳呼畫師閻立本是時已為主爵郎中俯伏池左研吮丹粉瞻望坐賔羞悵流汗歸戒其子曰吾少好讀書幸免面墻緣情染翰頗及儕流惟以丹青見知躬厮役之務辱莫大焉汝宜深戒勿習此技書家謂索靖有一筆飛白書畫家謂戚文秀畫清濟灌河圖中有一筆超騰回摺逾五文通貫於波浪之間豫謂文家亦有此訣惟司馬子長之史韓退之蘇子瞻之文社李韓蘇之歌行大篇足以當之硯山齊雜記卷二
