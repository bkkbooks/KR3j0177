body:
  text: 硯山齋雜記卷三北平孫承澤編硯説前篇蘇易簡研譜曰栁公權論研以青州石為第一絳州者次之殊不言端溪自漢晉及唐皆稱研瓦所用者未央宫瓦銅雀臺瓦長沙王吳芮廟瓦即稱佳品但瓦以陶成終屬泥質泥隨磨而下故研面漸凹而墨亦減色自石研出而瓦研遂稀必然之勢也當唐之季端溪之靈尚閟而未泄故青州絳州躐處其上如水晶未生玻璃遂居第一耳山堂肆考曰端溪水中石其色青山半石其色紫頂石尤為光潤如豬肝色者佳其貯水處有白赤黃色點者謂之鴝鵒眼脈理黃者謂之金線紋其山號曰斧柯昔人採石為研必以中牢祭之不爾則雷電失石所在端溪以水坑為貴而水坑之中有所謂老坑者尤貴焉果係老坑石色在所不論如相馬者之不以驪黃也青紫豬肝色余皆得見之求所謂磨而能發留而不耗者則空谷足音也眼之有無本不關研之聲價但有眼者方為端石則一定不移之理也至於有眼而又必辨其美惡髙下則精而益精之論矣東坡筆録曰端石所出巖石為甲石屋次之西坑又次之然巖石又分上下有活眼淚眼死眼之别圓暈相重黃黑相間黳睛在內晶瑩可愛謂之活眼四旁浸漬不甚瑩明謂之淚眼形體略具內外皆白殊無光彩謂之死眼活勝死死勝無如坡翁論則無眼為下品矣以余所見有蕉葉青花瑩然明淨如一段玉璞者玩之令人不忍釋手豈以眼之有無為髙下哉唐彥猷曰端石有上下巖西坑後磨惟上巖有眼眼之美者青黃黑三色相重多者自外至心凡九重其大者尤為希有或布研中為下比星房之形其生於墨池之外者謂之髙眼生於墨池之內者謂之低眼世多重下巖真下巖無眼亦貴者也邵氏聞見後録曰端石如德人每過於厚而或亷於才不能砥滯歙石如俊人遇輒傾倒失之輕而遇事風生無不一一厭足人意按端石之生水坑者肌理融膩而研磨之際若吸若粘雖數十年不改歙石至堅其新製也誠有如邵氏所云而鋒鋩既盡則與墨相拒非再為磨礲不可邵氏之言蓋徒知兩者之新而不知其舊也稗海曰小湖石在端州之西四十里石色紫而稍燥間有有眼者類雀兒眼但無瞳子耳後瀝石在端州之北十里其色赤紫質亦極細但不甚潤耳性又極軟間有有眼者但一兩暈不能多也蚌坑在下巖穴之下一小溪今已嵗久中多崩塞其石久為風日雨雪所侵性甚堅頑極不發墨其石色正紫而瑩淨間亦有眼色殊駁雜無層暈也大抵諸石在穴中正如石榴子隔楪磈礧各有石井籠絡之其中皆有硯材大小不等既施斧鑿十分之中可得三四許耳又有一種圓如瓜瓠暈眼甚佳者極鮮得之大抵下巖之價二十倍於上巖下穴之價十倍於半邊山及諸穴半邊山之價十倍於小湘小湘之價十倍於蚌坑蚌坑之價十倍於後瀝後瀝絶品亦不過數十倍也此論甚詳且備水坑真君子也諸石非君子而冒為君子者也精而察之百不失一矣又曰端州𨽻肇慶府石出斧柯山距州四十里所謂靈羊峽對山也元有四種一曰巖石二曰小湘石三曰後瀝石四曰蚌坑石而巖石者最精以舟入一小溪即蚌坑也水陸行八百餘步至下巖自下巖行十許步至上巖自下巖轉而南凡百餘步至龍巖合計上巖凡三穴下巖止一穴半邊山巖凡十餘穴然必以下巖為勝焉龍巖乃唐初取研處其石色正紫而不及下巖後得下巖遂置龍巖不復取今下巖石已取盡遂取諸半邊巖近亦塞矣可取者惟上巖耳至下巖止一穴泉水浸溢嵗久石屑崩塞雖千夫終嵗掘濬亦不可得也北壁嵗亦在水底石色乾則灰青紫石色濕則深紫其眼正圓有瞳子暈數十重緑碧與黑白相間如畫其青緑處頗如翡翠色也南壁石者水半石也上巖三穴則土地之巖其中穴即梅珠巖其下穴今俗呼為中巖者是也上穴中穴今已崩塞下穴中亦有開路採石之處下無積水上有泉滴如飛雨其石色乾濕與下巖相同但稍多紫色耳北壁者與下巖南壁相類但下巖與南壁石色微帶黃眼有瞳子暈七八重青黃黑白緑相間不及北壁眼之無暈也上穴中穴石色益黃其眼亦帶黃色半邊山諸巖曰大秋風曰小秋風曰獸頭曰獅子曰桃紅曰荷頭曰新坑曰黃坑其石亦類下巖但眼暈只三四重色亦青碧可愛惟重層疊暈稍駁雜耳凡巖石俱有兩壁各石三層上為覆石其質燥甚下為底石其色頗雜雖潤而不發墨三層石之後其上第一層謂之頂石其二層謂之腰石或有眼或無眼第三層謂之腳石無眼大抵有眼之石在本巖中尤為細潤者也下巖之石謂之鴝鵒眼上巖下穴謂之鸚哥眼上巖中穴謂之雞翁眼貓兒眼半邉山謂之雀兒眼鷯哥眼土人以此别之此説敘述如指掌斧柯山如在目前矣又曰廣東肇慶府髙要縣羚羊峽對山出研三種巖石為上西坑次之後磨又次之其色深紫瑩潤其聲扣之清逺有青緑黃重暈圓點者謂之鴝鵒眼此巖石也其色赤呵之乃潤亦有鴝鵒眼但色紫紋漫而大者此西坑石也其色青紫向明側視有碎星光點如沙中雲母乾而少潤者此後磨石也又有子石在大石中匠者識山之脈理鑿一窟自然有圓石青紫色者琢以為研可值千金也石分三種分别詳明而指示簡切蓄研者熟之瞭若指掌矣又曰潘生為余言端研近無佳者成化中羚羊峽出竒石嫩軟如肪以刀剜之方圓隨製迎風乃堅有文成花卉禽魚之狀綵色爛然土人爭掘取之往往為崩崖所壓守臣封間之今不可得矣按研譜以子石為上子石者生大石中色理瑩潤蓋石之精者也未聞有嫩軟如肪者豈精粹之極殆石髓歟研以注水不耗而發墨者為佳鴝鵒眼為真今之有眼者多矣而不耗發墨者難得也截肪石子之説如交梨火棗存其説可也不耗發墨乃研中確論收藏家千百中不能得一也吳道思曰端研因端州而得名也有曰屏風背有曰宣德巖有曰梅花坑名亦比比而最佳者則曰老坑蓋老坑者自宋以來取石鑿山成坑坑深里許廣數里許天雨水無所泄則水滙於坑故欲取老坑石者必戽盡水乃可而戽水之費必千金焉且下坑採石從旁而入廣則數里而髙僅三尺許也蓋上下皆砂礫祇此三尺之石又分三層為界乃有火熖青花鴝鵒眼黃龍尾種種耳採石者坐一木板傴僂而入鑿之日或止得一二或砂或皮即得佳者又損者多而全者少故老坑之石以方且大者為貴焉若巖嘴石則在老坑之口朝天巖則在老坑之背如得水氣而溫潤者可贋為老坑蓋此三地與老坑同一山故相類也老坑之不可得自前代已然然則今之端硯皆巖嘴石朝天巖耳又曰石色不同有馬肝紫者有鳳咮赤者有龍尾紋者有蕉葉白者大約骨欲堅理欲膩其上有細花浮出自然青白色者尤佳皆由水石互相涵養經千百年孕成太隂之精此真下巖之産也此吳君端硯歌約其詩以為言者也朱平涵曰端溪舊石久不可得萬厯間採珠內臣至其地測舊坎水深數丈用皮囊汲至百日水盡人縋而下拾取鑿零塊頗多水忽大至縋者亟上得免時憨山和尚在彼覔得致王損庵五六方大者長尺餘髙半之召匠依古式琢成董思白題識細潔瑩淨宛如碧玉天然竒珍可愛細潔瑩淨評端石最當但云宛如碧玉從未見有碧色之端石也王損庵曰端州硯石中唐以後已漸知名栁公權云端溪石為硯至妙許渾嵗暮自廣江至新興詩云洞丁多鑿石蠻女半淘金自注云端州鑿石李賀歌曰端州匠者巧如神則此時採者已極盛矣蔡絛曰太上留心文雅大觀中命廣東漕臣督採端溪石硯上焉時未嘗動經費乃括二廣頭子錢千萬日役五十夫久之得九千枚皆珍材也時以三千枚餘二千枚分賜大臣侍從而諸王內侍咸願得之詔更上千枚餘三千枚藏之大觀庫於是俾有司封禁端溪之下巖穴蓋欲後世獨貴是硯也按下巖石在深溪中所謂千夫挽綆百人運斤豈虛語哉豈五十夫所能辦又安得如許珍材蓋徽宗非精鑒人只誇多耳而絛之言又未足信也新語曰羚羊峽口之東有一溪溪長一里許廣不盈丈其名端溪自溪口北行三十步一穴在山下髙三尺許乃水巖口也匍匐而入至五六丈為正坑從正右轉數丈為西坑二門最小從其旁入為中坑從正坑坑左轉十餘丈為東坑東坑外即大江矣坑中水淵渟不竭以罌甕傳水注槽筧中水稍竭乃可下鑿石有三層上層者稍粗中層多鸜鵒眼下層在水底多破碎不受斧鑿凡西中東三洞皆然三洞皆有蕉葉白火捺而東尤美其美也以有青花微細如塵隱隱浮出或如蟣虱腳者為上粗點成片者次之蓋石細極乃有青花青花者石之精華也外則有若黃龍文者朱砂點者麻鵲斑者水氣縈折如一道川流者圓文如水花珠湧有層數者拖緑纎長如玉帶者黃若絲縷名金線者斑蝕如蟲嚙名蟲蛀者兩旁色赭名鱣魚邊者凡十餘種其火捺以紫氣奔而回礴又如血暈散開有若雲霧之氣或小而圓輪若金錢者蕉葉白以純白成大片者黃龍文以黃氣散布鴻鴻濛濛者麻鵲斑以點黃如粟者朱砂翡翠以紅緑分明者為上眼大者如五銖錢小者如芥子以活而清朗有黑睛非肉非淚非死者為上眼又貴碧不貴黃貴圓不貴長貴陽不貴隂黃明為陽緑暗為隂貴多暈暈有至十餘重者大率暈有竒無偶然與黃龍金線等紋皆石之病也火捺蕉葉白亦乃石皮而青花之粗者又巖底最下一層不足貴也大抵上下四旁者皆不精上層為天花板粗燥最下層為沙板過細又不精惟中層者純深秀嫩一片真氣如新泉欲流又如雲霞氤氲溫柔長暖斯乃石之髓也得之可以盡廢諸巖石矣余嘗得其一名曰水肪其序云端石有五質水質為上者水之質也水之精華所結虛而為雲實而為石人見以為石吾見以為水故以水肪稱之肪者水之膏腴也銘曰水為石命火為石性斯水之精以玄而聖其質尚柔溫然可敬又曰唐宋古硯大率老坑新坑等十餘種落墨而不發墨雖有墨痕繡蝕古色可愛然不費水不費筆墨未有水巖之美者他若黃坑錦雲梅花坑屏風背宣德巖朝天巖諸石率燥濕渴筆飲墨久用輒成鏡面惟水巖石停墨不乾墨著筆端即起積痕細薄披之盡脫以薑及浮炭片磨洗宿墨復堅細浮潤如故墨如雲氣蒸湧少研輒滿其體重而輕質剛而柔磨之寂寂無纎響按之若小兒肌膚溫潤嫩而不滑秀而多姿握之稍久掌中水滋蓋筆陳圖所謂浮津耀墨無價之竒者也水巖在老坑之內宋治平中於此採硯東坡所謂千夫堰水挽綆汲深篝火下縋百夫運斤而得之者初從頭洞至水坑自髙而卑凡二里許魚貫而入不得昻首直腰中有軒有竇或盤或援乃得而至以豬脂漬布燃照沿洄曲水而行行皆向東初至者為西洞其石無眼又入為下巖宋所開坑名曰康子巖者也此巖最寒能傷人又入為東洞康子巖之前為南洞多蕉葉白其後為北洞口石彌純粹水彌深緣外近江水久必有穿漏之患者昔人取石留數柱支之以防傾圯名為東留柱西留柱今亦並取之以木柱代矣凡石之外皆有粗石粗石內連臕剖臕乃得石火捺者石之堅處血之所凝故其色紅紫或黑也蕉葉白者石之嫩處膏之所成故其色白也其一片純潔無斑纇真紫碧青微有青花如秋雲錦密或如水波微塵視之不見浸於水中乃見必須心如毫髮乃知其妙此石乃在窮淵水之所凝雲之所成玉而非玉冰而非冰水為其氣雲為其神其石之質欲化而冰之體已堅此真端溪之精英其價過於瑶瓊者也凡香有結石亦然香木之結者為香端石之結者為硯其石大至數尺去其不結者取其結者僅得掌許故硯之大而佳者最難得通計水巖中石之結者無幾非片片皆精好也又曰端溪之南第一峯第一條坑為水巖第三條為文殊坑當中一條為虎坑水巖之上為屏風背為朝天巖為新坑為巖仔為宣德巖宣德巖久已無石西洞今亦鑿穿江水入焉不可以復鑿即鑿亦僅容二斧四人而已中洞尚可容六斧十二人東洞可容四斧八人此巖自宋治平四年重開者內官魏封勒名其上封與江西石匠數十人被巖裂壓死洞中今巖中有魏太監墳葬其客魂而已石匠常為怪呌呼擲礫以嚇人入洞者毛髮凛然憂鬼魅之為害或亦山靈不欲精華盡出於人間也他若亞婆坑在峽北從第一條坑而入黃坑在峽南從龍華寺後而入石皆有眼而色紫質粗梅花坑在峽口東從沙步曲水村而入石亦多眼眼大而暈重不甚分明質青亦粗則山靈之所不甚吝惜者也當宋時水巖未開取石者皆於七星巖北將軍嶺之下名為將軍坑其石色黑無眼質亦粗至今黃岡硯賈尚取之然諸坑皆易取惟水巖積水淵渟非具大力者不能取取必於冬始於春終天寒江落峽水稍淺乃可列炬而入杓泉而出金錢之費甚不資然得佳石無幾蓋天地之精華有盡一卷之多與蛟螭爭於水府崖壁一坼性命齊捐可不畏哉大抵佳石之得良有命焉不可以人力強求余少頗蓄硯以熊制府所開石為最次則某藩王所開石今時石皆不如昔蓋端溪之精華亦已盡矣能勿貴哉又曰磨硯先以水巖口之前亞婆井粗石磨之須以靈山寺前細沙和粗石磨之次以蚺蛇坑之石細磨之又以飛鼠巖之石細細磨之然後上蠟使顔色增潤或偽為佳眼於其上而蠟以沃之亦可觀大抵石以純粹無諸瑕疵色如羊肝淡紫生氣蒸蒸者為上眼非所貴也水巖率無眼眼者石之筋絡亦石類耳然石美亦不妨有眼相傳下巖舊坑卵石色黑如漆細潤有眼眼中有暈或六七眼相連叩之清越研之無聲著墨不熱無泡良久微浸若油艷美此種至慶厯間已少矣中巖在山半名半邊巖其卵石紫嫩肝色細潤有眼小如菉豆有條紋或白或緑扣之及研皆無聲外有黃臕包絡久用鋒鋩不退宋時此坑取之亦竭矣中巖新坑石色淡紫眼如鴝鵒有暈其嫩者扣無甚聲磨墨有微聲久用鋒鋩退乏此不及下巖逺甚上坑舊坑有青紫新坑石皆灰色紫亦粗燥眼如雞眼大扣之磨墨皆無聲有松板紋久用光如鏡而比中巖又遠不及總之水巖石佳者有窮自宋至今英華日消金礦銀坑砂窟且已告盡而况於九淵神髓之美踰瓊瑶者乎侯官髙兆固齋曰端州分野值星紀僧一行曰天地兩界山河與天之雲漢始末謂星紀得雲漢降氣為百川下流云羚羊峽距郡東三十里束三江之水其山産石類瑊玏唐宋以來才人文士采作硯材蘇文忠稱為寶石蓋東西粵扶輿之氣所藴閟也未至峽十里為大蕘山皆牛毛細皴宛如畫境峽山青蒼對峙江流泓淨頗似嚴瀨峽石之礦凡十有一北岸坑曰附婆曰白婆墳其石質黯黝不鮮佳者亦有火捺紋蕉葉白可亂水巖朝天巖惟青花中黃星密灑如塵眼大於螺若人張目湛湛無神真賞家以此辨定碧點長斜似眼無瞳每石一片可得十二三點十數點者梅花坑在峽外三水境中峽將盡岸南山坳有洞書宋治平四年差太監魏某重開土人名曰巖仔坑其石叩之聲泠泠久磨能滑旁有冢相傳其時開鑿中虛崩閉數百十人太監死焉守者葬其冠服於此坑下度小山曰新坑其石細潤微青蕉葉白亦青西上越水澗隔里曰朝天巖隔里者土人名坑為隔裏也其石堅實不能滑膩火捺紋成結不運若蠟炬著堊壁斜焰及燒損几案處蕉葉白色晦氣黃純潔無痕者亦可貴古塔巖之石比朝天巖無火捺紋蕉葉白古塔巖後為屏風背具石木如譬豬肝曝於風日宣德巖在屏風背下去水巖二里許其石倣佛水巖今不可得巖仔坑東有洞廣如屋曰棲安洞舊時開坑石工所棲之處又東有小山圓阜下為小坑折上數十武有萬厯二十八年差督理珠池市舶內官監太監李鳯開坑封坑月日立石洞臨江口小於圭竇石工裸身盤盛豨膏燃火腰縋螺旋而進入洞西轉有淵不測先投以石聞水聲急轉西折不則投深淵矣正洞容工一二十人由正洞入西洞漸寬東洞舊納四人二人運鑿二人仰卧膝前置磁盤燈於胸以燭之不能坐立以捧今容七鎚且十四人矣三洞正洞之石上上次東洞西洞又次之土人皆名曰老坑石凡三層上層近山沙逺漏如蠧蝕曰蟲蛀其質微遜中層常有翡翠雜拉火捺紋蕉葉白其絶品也東瓜穰青花及眼生蕉葉白之下石工所名下層石也又下麻鵲斑紋成魚凍或如唾涎亦有眼眼中瞳含沙多脫去此中石時有蔚藍者秀色可餐不一見下此底板石云中層下層火捺紋如朝霞蔚起散若馬尾若刷絲縈繞絢采熊熊大當錢有芒曰金火捺品上上黝然黑色曰鐵捺如蚓曰鳯涎皆石疵蕉葉白上下四旁必有火捺紋掩映舊坑皎潔比紈素近坑白中雜出青花也青花上品若澗沚細藻朱碧瑩然濡縷又如魚兒隊行青花明顯如石花菜者石工稱為芋紋品中中三洞眼各異正洞眼赤圜如珊瑚鳥目石嫩眼侵土氣者若象牙其瞳分明亦足賞東洞眼碧色數暈對之奕奕射人曰鴝鵒眼圓正明媚者不易得他洞偶一有之西洞眼黑圜瞳一黍如豉三洞石正洞下層第一入手溫潤柔膩有生氣鮮潔蒨麗磨之與墨相親摩挲心動東洞西則深處曰飛鼠巖其石有紋曰黃龍斜亘石面工指為瑕正洞亦有黃龍紋遊揚如雲氣如薄羅足移人情三洞俱在水中冬日引水盡乃可取正洞北潭底水深不可引時有鬼神東洞經傾仄水工列小童長跪舉杯勺揚水水乃涸以故開坑必先引水閲月費金錢至纍千金舊制把總一員專轄守坑律令盜坑石者比竊盜論其厲禁如此永樂宣德間兩開坑未幾俱罷去崇禎末蜀人熊文燦總督兩廣日指揮蘇萬邦致石工於江西緼火中夜開坑不敢在日中也丁亥後守禁罷至今凡六開坑工受官役計日有程不擇膚理鑿伐坼裂宋元明五百餘年未聞也大抵石理日剝精華日盡氣韻顔色不能一執成説要以老坑具妍姿者為定余至端州正值開坑所見三十年前石與今異訪之石工其言殊别徴其説各護所偏余既喜身親古人未言之見聞復重慨夫文明之璞一旦割裂而出天地真藴山川元氣漸至竭耗不數十年此山便成陵谷無復問津之處爰述於編陳元孝跋曰硯之用發墨不損毫二者盡之矣不損毫常硯皆能之惟發墨之妙非親試水巖不知也他硯粗則挫墨細則拒墨水巖不然玉肌膩理拊不留手著水研墨則油油然若與墨相戀不捨墨愈堅者其戀石也彌甚以他硯並之水之分數同墨同手同而為研之數水巖常少於他十之三四每春夏間積雨時墨竟日用之則必有稜角軟腐反張之患惟水巖可免此病驟以他硯易之頃刻不勝其苦矣硯槽之水隆冬極寒他硯常氷而水巖獨否具此數妙雖使椎朴無文猶將拂拭用之况其體質之美千竒百變不可殫窮豈南離文明之德獨萃於端溪耶固齋所考剖析辨證已無遺義然近嵗往往有一二所新出之石氣韻顔色幾足亂真不深心識别鮮不為所眩惑亦有出自水巖如固齋所云精華日見不能一執成説者又不可不辨也張世南遊宦紀聞曰硯品中端石人皆貴重之載於譜記凡數家取豫各異或佳其有眼為端或以無眼為貴然石之青脈者必有眼嫩則多眼堅則少眼石嫩則細潤而發墨所以貴有眼不特為石之驗也眼之品類不一曰鸚哥眼曰鸜鵒眼曰了哥眼曰雀眼曰雞翁眼曰貓眼曰菉豆眼各以形似名之翠緑為上黃赤為下諺謂火黯為佳然亦石之病也髙廟嘗書翰墨數則以賜曹勛其一云端璞出下巖色紫如豬肝密理堅緻瀦水發墨呵之即澤研試則如磨玉而無聲此上品也中下品則皆砂壤相雜不惟肌理既粗且復燥而色赤如後厯新背俱不可用製作既俗又滑不留墨且石之有眼余亦不取大抵瑕翳於石有嫌况病眼假眼韻致尤不足觀故所藏皆一段紫玉略無點綴已上皆聖語石眼少而色正者方為佳物王損齋筆麈曰爛柯山在髙要縣東三十六里峰頂常有紫霞蓋寶石之氣也石之佳者紫氣鮮潤如胭脂中有青紋謂之青縧其文如雲霞如錦綺李長吉集中所謂青花紫花硯者是也長吉詩云踏天磨刀割紫雲傭刓抱水含滿唇暗灑萇𢎞冷血䀶劉禹錫詩云玉蜍吐水霞光淨綵扇搖風絳錦鮮非目覩斯石不知是詩狀物之工也又曰硯譜云下巖北壁石背為泉水所浸瀰漫湧溢下流為溪巖之中嵗久崩摧石屑翳塞積水屈曲淺深莫測以是石工不復能採矣今世所傳下巖硯皆唐五季國初時物觀此則今世所傳宋貢硯非下巖石彰彰矣至萬厯草七年採珠內史奉詔開採使蛋人泅而取之則塊生其中有黃臕如玉璞然鑿去始見硯材然百不得一焉於是下巖石始復出世又曰歐陽永叔云端石以子石為上在大石中生蓋精石也而米元章非之謂嘗遍詢石工云子石未嘗有其在巖實於大石板上鑿豈有中包一子者余意其説必確今乃知下巖石品貴重鄰於寶玉皆有粗臕裹之如子之在胎胞故名之曰子石耳米氏又云下巖既深工人所費實多硯直不補故力無能取近年無復有聞則知所詢石工所見乃半邊石巖及蚌坑石耳豈復知有下巖子石者哉又曰端石堅潤如玉而著墨如泥蓋天生硯材也宋時下巖既不可得而蚌坑等皆山中常石故宋髙宗翰墨志與蘇東坡范石湖輩皆謂端石不發墨而新歙之龍尾方城之葛仙公巖山溫州之華嚴寺巖石品出其上豈定論哉新歙硯絶無佳者而宋硯光滑拒墨特甚蓋用久則鋒鋩頓盡遂成棄而方城溫州兩石今絶不聞可硯者惟下巖端石萬古如新今日所得直追中唐逺出宋硯之上何啻千百倍亦一時之盛也又曰聞之自嶺南來者云彼中良硯材多石璞解去粗臕乃得之有重十餘斤者姚寬西溪叢語曰端硯下巖色紫如豬肝密理堅至溫潤而澤儲水發墨叩之有聲但性質堅礦斷裂尤多瑕疵秋楓巖石色微淡可亞下巖而堅潤不及梅根巖一名上巖二巖俱沙壤相雜無水泉之潤故色淡而燥肌理稍粗然中巖猶勝上巖新坑石色帶紅紫其文細密材質厚大無瑕然止是崖石頗乏堅潤後崖石與新坑略相似又處其次西坑六崖石色青微黑佳者如歙石粗羅紋而發墨過之石眼圓暈數重青白黃黑相間極大者為最勝土人以晶瑩圓明中無瑕翳者為活眼形模相類不甚鮮明者為淚眼形體略具內外皆白殊無光彩者為枯眼魏泰東軒筆録曰余為兒童時見端溪硯有三種曰巖石曰西坑曰後瀝石色深紫襯手而潤幾於有水叩之其聲清逺石上有點青緑間暈圓小而緊者謂之鸜鵒眼此乃巖石也採於水底最為土人貴重又其次則石色亦赤呵之乃潤叩之有聲但不甚清逺亦有鸜鵒眼色紫緑慢而大此乃西坑石也土人不甚貴重又其下者青紫色向朗側視有碎星光照如沙中雲母石理極慢乾而少潤叩之聲頗重濁亦有鸜鵒眼極大而偏邪不緊謂之後瀝石土人賤之西坑硯三當巖石之一後瀝硯三當西坑之一則其品價相懸可知矣自三十年前見士大夫言有得端巖石者豫觀之皆西坑石也邇來士大夫所收者又皆後瀝石也豈惟世無巖石雖西坑者亦不可得而見矣本朝宋弇山順天人端硯説曰端溪距肇慶三十餘里在羚羊峽中江之南拗一小河入入即達溪溪繞衆山之足盤回頗逺所謂舊坑者已湮沒百餘年矣坑採石久深踰數丈地中流泉滮發與溪流滙竟成巨潭不可入也石工乃採之新坑坑亦近百餘年石亦竭水復如之比乃採之朝天巖巖石具青紫二色中有筋膜作黃緑紋質微粗燥初用亦利墨用之年餘則石亦漸膩墨亦不發但叩之則其聲清越且久潤可作几案供爾間有新坑石藏久者冒為舊坑懸價甚昻非數鐶不能得新坑色如紫玉瑩潤無膚理纎瑕不生墨所經易發置之匣中餘漬亦能經宿不消日常易摧毫不如舊坑之細膩也辨硯者不在聲之有無而在相其質質有二有有眼者有無眼者眼亦有二青紅緑别白在外黃暈在中居心有墨子一粒儼鴝鵒目突起者謂之活眼其他自一以至雙或蛾眉或三星或斗文或星宿海文或髙下玉笋斑文皆可貴也獨死眼則稱劣焉死眼者外無青赤綿痕黯然一斑若豆子中作黑暈雖亦隆起但周石不過一二眼質最居下也至於石之良劣則不在眼之有無其稱有眼為佳者物好異耳使紫玉瑩然亦自可貴何必棄瑜而取瑕耶順治中靖藩鎮粵移閩聞舊坑名思得之乃出多金募水工車水水盡見坑遂採佳石以出於是諸司亦捐俸錢各採一二役既竣仍導水歸坑而舊坑之石乃得再見人間矣近來粵地亦間有售者一硯之價至索數千金誠鴻寶也余兩見友人所蓄舊坑色具紫黑質微滑稍加撫摩則濕潤應指而生呵之研墨可以作字磨墨按納不待用力而滃然蓬勃少注水粒許可以竟日津津而絶不病頴與新石逈殊案頭獲此差足樂也東坡謂一錢可以買擔水供數月何用擇石為此矯癖語耳豈通論哉硯説後篇新安志龍尾山在婺源縣東南開元中獵人葉氏逐獸入山見疊石瑩潔攜歸刋成硯南唐元宗時歙守獻硯薦工李少微擢硯官髙似孫硯箋云龍尾石在水中極溫潤性堅密聲清如玉歐陽公硯譜天下之硯四十餘品歙硯龍尾石品居第三歙州硯譜云羅紋山亦曰芙蓉溪硯坑十餘處硯坑訪於彼俗雖有龍尾山實無石好事者相傳多云水中石續博物志曰硯譜載天下之硯四十餘品以青州紅絲石硯為第一端州斧柯山石為第二歙州龍尾石為第三江南省志歙硯出龍尾山以青色緑暈多金星者為上郡志又稱有刷絲石棗心石小斑紋粗羅紋細羅紋瓜子紋總出深溪者始可珍重自南唐置歙硯務搜取殆盡矣范石湖婺源硯譜龍尾硯石秀潤玉質天下硯石第一今其穴塞已數年大木生之不復可取或因洪水漂薄砂礫間得異時斧鑿之餘至瑣碎者亦製為硯縱橫不二三寸稍大者即是故家所藏舊物士大夫既罕得見故能察識者少遂以端石為貴端石絶品猶不能大勝刷絲東坡鳯咮硯銘云生金龍尾羞牛後此乃武夷灘石耳那得度龍尾前一時謔語非確語也歐陽文忠曰歙石出龍尾溪以金星者為貴龍尾硯在端溪上而端溪以後出見貴耳夏曉堂曰龍尾之新也質粗而傷筆龍尾之舊也質堅而拒墨未可以駕端溪而上之東坡贈龍尾硯詩曰君看龍尾豈硯材玉德金聲寓於石坡公文忠門人亦一時風氣如此稗海曰徽州婺源石産水中皆可為硯材品色頗多一種石理有星點者謂之龍尾石蓋出於龍尾溪其質堅徑最能發墨前世多用之以有金星者為貴其石理微粗以手摩之索索有鋒鋩者尤妙以深溪為上或如刷絲羅紋棗心或如瓜子兩兩相對又有一種色青而無文大抵硯質以精潤發墨者為佳又有祁門縣文溪所産石色青紫石理溫潤發墨較後瀝石差堅近時出處價倍於常土人以石材厚大者為貴薄小者次之又徽州歙縣名小溝出石亦青潤可作硯但石理頗堅不甚發墨其紋亦有刷絲者緣土人不知貴重故不用耳今之名龍尾而不能發墨者必小溝産也即文溪亦不可得多而况真龍尾哉稗海曰歙硯石出龍尾溪堅硬發墨逺勝端溪此即歐公之論唐彥猷曰紅絲石硯出青州石外有皮須磨礲去之其裏紅黃相參裏黃者其絲紅理紅者其絲黃須飲水使足然後可用不然則燥渴矣用之不減端石也此論與歐公龍尾説相枝拄然欲以抗端溪更愚矣飲水不足則燥渴尚得為佳品耶稗海曰鼉磯石出登州鼉磯島中島距蓬萊百餘里有石之可硯者金星雪浪頗為世重故取之者不憚於沒溺焉此又硯石之别種也山堂肆考曰宋張仲機有龍尾紫石東坡以銅劍易之據此則龍尾亦有紫色者矣東坡雜記云建州北苑鳯凰山有石聲如銅鐵作硯至美有如膚筠又云僕好用鳯咮硯論者多異同蓋少得真者多為黯淡灘石所亂耳子由硯録序云北苑鳯凰山咮潭中石蒼黑堅緻如玉以為硯與筆墨宜熙寧中太原王頤始發其妙然石性厚薄者不及寸按胡仔溪漁隱叢話云鳯山石頑燥非硯材土人未以為硯若劍浦黯淡灘有一種石黑眉黃眼人以為硯鳯咮必此灘石也又云鳯凰山之後有一泉廣三四尺石甃其底特一小井子由所云咮潭其地初無之又安得潭中石以為硯乎蘇氏兄弟為王頤所紿耳歐公硯譜子石在大石中生蓋精石也而俗訛傳遂以紫石為上唐彥謙硯録云山有自然圓石刻其璞得焉謂之子石葉少藴曰東坡作鳯咮石硯銘云出北苑鳯城山余至建州求之無有蓋南劍黯淡灘石也此石有二種其一出鹵水去黯淡四十里細潤而不甚發墨黯淡灘石宜墨而膚理不逮稗海曰南劍州黯淡溪水中出石質深青黑而光潤扣之有聲作硯發墨宜筆土人琢治為香罏諸器極精緻東坡所謂鳯咮硯者是也栁子厚栁州山水記曰壁曰龍壁其下多秀石可為硯劉澄之江州記曰興平縣蔡子池南有石穴深二百丈許石色青堪為書硯四譜曰絳縣人善製澄泥硯縫絹袋盛泥置水中踰年而後取則泥已實囊中矣陶為硯水自不涸稗史曰歸州大沱山石出江水中其色青黑有紋斑如鷓鴣質頗粗可為硯土人互相貴重甚發墨峽人謂江水為沱故名大沱石宋朱輔溪蠻叢笑曰金帶繫硯石出黎溪今大溪深溪竹寨溪木林岡石皆可亂真紫石勝揭石熟猺亦能礪砥黎溪為最蓋於淘金井中取之近亦難得有紫緑二色圍黃線者名金帶繫洮石硯乃硯之佳品余所深賞以為在端溪之上而古今論者絶少惟馮內翰延登雷御史淵二詩頗盡洮硯之妙馮詩云鸚鵡洲前抱石歸琢來猶自有清輝藝窗盡日無人到坐看玄雲吐翠微雷詩云緹囊深復有滄洲文石春融翠欲流退筆成丘竟何益乘時直欲礪吳鈎觀二詩則洮硯之足珍信夫四譜曰魏銅雀臺遺址人多發其古瓦琢硯甚工貯水數日不燥世傳昔人造此臺其瓦俾陶人澄泥以絺綌濾過加胡桃油埏埴之故與他瓦異銅雀硯辨崔後渠彰德府志辨硯云世傳鄴城古瓦硯皆曰曹魏銅雀磚硯皆曰氷井蓋徇名而未審其實魏之宫室焚蕩於汲桑之亂趙燕而後迭興代毁何有於瓦礫乎鄴中記云北齊起鄴南城屋瓦皆以胡桃油油之光明不蘚筒瓦用在覆故油其背版瓦用在仰故油其面筒瓦長二尺闊一尺版瓦之長如之而其闊倍今或得其真者當油處必有細紋俗曰琴紋有花曰錫花傳言當時以黃丹鉛錫和泥積嵗久而錫花乃見古磚大者方四尺上有盤花鳥獸紋千秋萬嵗字其紀年非天保則興和蓋東魏北齊也又有磚筒者花紋年號如磚內圓外方用承簷溜亦可為硯宋刺史李琮元豐中於丹陽邵不疑家得唐元次山家藏鄴城古磚硯背有花紋及萬嵗字與鄴中記合又曰大魏興和二年造則唐賢所珍已出於南城矣飛亷館瓦元王文定惲秋澗集有飛亷館瓦硯歌略云劉郎杳杳秋風客神鳥𡨕飛憶初格豹章爵首尾蟠蛇建章千門風冽冽云云此亦在銅雀之前知漢瓦無不可為硯也吳震方青壇曰端石出肇慶府羚羊峽有上巖中巖下巖之别有水坑旱坑之分有舊坑新坑之目其宋時舊坑包公所謂不持一硯者今亦無所得石矣其石之精粗美惡人人聚訟皆由身不至端溪以耳為目此倡彼和究莫能得真石也彼地惟一僧及二三武辨識之蓋以前當事者開坑令其監督日與土人石工及好事收藏者講究故能略識其梗概也大約不論石之大小眼之有無以細潤光嫩者為上其發墨與否久而後貴初出未有不發墨者也造為種種異名以炫逺近古無此也其眼不論大小以層次分明色澤圓活者為佳藏硯之人故自矜許掌大舊坑非數千金不可致至於城外廟前肆中所賣者皆屏風巖旱坑之石其價極賤即新坑亦不可得矣端溪龍尾俱見其佳者鼉磯島亦曽見之不甚佳也讀楊月湖憶硯詩云常山硯多青紫色不徒發墨仍潤澤則常山亦有硯材矣詩中云獲之如得琮璧失之如喪珍竒則推許未免過情亦人各有好不可強乎但云上品更多有紫袍玉帶者何其與楚中浰溪石相類也先生名亷字方震江西丁酉解元硯一名墨海黃帝得玉一紐治為墨海篆曰帝鴻氏之硯然則硯墨之來久矣硯山齋雜記卷三
