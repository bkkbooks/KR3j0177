body:
  text: 硯山齊雜記卷一北平孫承澤編六書古文者蒼頡舊體周世取用之文字案班固漢志及許氏說文書本有六體一曰指事上下二曰象形日月三曰形聲江河四曰㑹意武信五曰轉注考老六曰假借令長此造字之本也自蒼頡以至今字體雖變此本皆同古今不易也自蒼頡以至周宣皆蒼頡之體未聞其異宣王紀其史籀始有大篆十五篇號曰篆籀惟篆與蒼頡二體而已衛恆曰蒼頡造書觀於鳥跡因而遂滋則謂之字字有六義其文至於三代不改及秦用篆書焚燒先代典籍古文絶矣許慎說文言自秦有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書亡新居攝以應制作改定古文使甄豐校定時有六書一曰古文孔子壁內書也二曰竒字即古字有異者三曰篆書即小篆下杜人程邈所作也四曰佐書秦𨽻書也五曰繆篆所以摹印也六曰鳥蟲書所以書幡信也由此而論即秦罷古文而有八體非古文矣以至亡新六書并八體亦用書之六體以造其字其亡新六書以秦八體用其小篆蟲書摹印𨽻書去其大篆刻符殳書署書而加以古文與竒字其刻符及署書蓋同摹印殳書同於繆篆大篆正古文之别以摹古故乃用古文與竒字而不用大篆也是孔子壁內古文即蒼頡之體故鄭𤣥云書初出屋壁皆周時象形文字今所謂蝌蚪書以形言之為蝌蚪指體即周之古文鄭𤣥知者若于周時秦世所有至漢猶當識之不得云無能知者又亡新古文亦云即孔氏壁內古文是其證也或以古文即大篆非也何者八體六書自大篆與古文不同又秦有大篆若大篆是古文不得云古文遂絶以此知大篆非古文也吾衍論字有七變古今字有七變一曰蝌蚪書蒼頡觀天地之文以意度為之文字之祖今之偏旁是也以漆㸃木故其文多似水蟲故曰蝌蚪二曰籀文大篆史籀取蒼頡形意配合為之大篆是也史籀所作故曰籀文三曰小篆李斯省籀文之法同天下書者也以籀書為大篆故此曰小篆四曰秦𨽻程邈以文牘繁多難於用篆因減小篆為便用之法故不為體勢非今之𨽻書也便於佐𨽻故曰𨽻書世傳秦權秦量刻文即秦𨽻字人不能别亦謂之篆誤矣或謂秦未有𨽻且疑程邈之說故詳及之五曰漢篆漢器欵識及諸印文是也即秦之𨽻書也六曰漢𨽻蔡雍石經及諸漢碑之字是也此體最為後出皆有波法與秦𨽻同名其實則異又謂之八分書七曰欵式諸侯本國之文也古者諸侯書不同文故形體各異秦有小篆始一其法近之學者取欵識字為用一紙之上齊楚不分人亦莫曉其謬論鍾鼎文之謬近世戴同以鐘鼎文編六書故不知者以其字便於用無說文聱牙之患多取之形古字今雜亂無法鐘鼎偏旁不能全有即以小篆足之或一字兩法人多不知凸本音睘加宀即為寰字乃音作官府之官村字本作村從邑從屯今乃書為村字從木從寸又引杜詩無村眺望賖為證謬誤甚矣况說文無此村字許慎引經為證漢時文皆篆𨽻乃得其宜今同引經而不能精究經典古文反以近世嗟誤俗字引以為證鎊鏟鍬鋸尿屎等字皆係世俗字為鐘鼎篆體各有詳注卯字所解尤為不雅編首字源分門類為次第蒼頡之法到此書為一厄矣學者先觀古人學書方知其謬字春秋以上言文不言字周禮外史達書名於四方注云古曰名今曰字儀禮䀻禮注云名書文也今謂之字蝌蚪文陸深書輯曰蝌蚪今之蝦蟆子也古未有筆墨以竹梃㸃漆書竹簡上竹硬漆膩畫不能行故首粗尾細自然成象後人巧擬形狀失本意矣識文之異湯允謨云識文夏用鳥跡篆商用蟲魚篆周蟲魚大篆秦大小篆漢小篆𨽻書三國𨽻書晉宋以來楷書唐用楷𨽻三代同隂識謂之偃囊其字凹漢以來或用陽識其字凸間有凹者或用刀刻如鐫碑凡陽識决非三代物篆𨽻袁桷云大篆不得入小篆𨽻書最忌入八分今世俗乃以八分為𨽻何其不察耶東臯雜録云漢碑額多篆身多𨽻𨽻多凹篆多凸惟張平子碑則額與身皆篆也劉禹錫宜城歌云花臺側生樹石碣陽鐫額不見漢碑不知此句為何說分𨽻正書不同秦之𨽻書乃篆之捷也與今正書不同然非分書也蓋𨽻書本如此後漸變為今正書耳歐公以此似今八分遂呼漢人分書為𨽻既知其不同且疑薛尚功摹之失體誤也今人作正書是鍾王法然鍾王古字亦多與今不同世傳六朝唐初碑上字分𨽻相雜疑當時正書如此至唐中葉已後始變如今法後人純學鍾王也鈍吟雜録草書褚先生補史記三王世家曰至其次序分絶文字之上下簡之參差長短皆有意人莫之能知謹論次其真草詔書編于左方是則褚先生親見簡策之文而孝武時詔即已用草書也魏志劉廙傳轉五官將文學文帝器之令廙通草書則漢魏之間箋啓之文有用草書者矣晉書郤鑒傳帝以鑒有器望萬幾動靜輒問之乃詔時草上表疏以從簡易故草書之可通於章奏者謂之章草章草黃魯直跋章草千字文曰章草言可以通章奏耳非章帝書也按張懷瓘書斷曰章草者漢黃門令史遊所作也王愔云漢元帝時史遊作急就章解散𨽻體漢俗簡惰漸以行之是也然雖曰草而𨽻筆仍在緣去𨽻未逺故也趙子昻絹書草書字訣歌跋云世有草書訣本非善草書者所作故多謬然初學便於誦習兼其間亦有可取者戲書一過以子久好此因以遺之載酒問竒載酒問竒字今人常用之然漢書第言劉棻從揚雄學作竒字而雄素貧嗜酒人希至其門時有好事者載酒肴從遊學則載酒學竒字蓋二事爾今人又以字之新僻者為竒字至以名齊名書皆謬也此所謂竒字乃大篆耳王莽居攝使大司空甄豐等校文書之部自以為應制作頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者也三曰篆書即小篆秦始皇帝使下杜人程邈所作也四曰佐書即秦𨽻書五曰繆篆所以摹印也六曰鳥蟲書所以書幡信也蕭子良云籀書即大篆新臣甄豐謂之竒字史籀增古文為之故與古文異也今乃以𨽻書之異者而冒其名皆不讀書之過也字數中域字數漢許慎說文九千五百九十三宋沈約四聲譜一萬一千五百二十隋陸法言廣韻二萬六千一百九十四洪武正韻依毛晃所定一萬二千一百四十六今陸溱范斗韻譜一萬四千五百二十二經生韻士所知曽不及半唐孫愐所收唐韻至四萬五千五百有竒署字集古録有五代時帝王將相等署字一卷所謂署字者皆草書其名今俗謂之畫押不知始於何代程史謂晉已有之然不可考南史齊髙帝在領軍府令紀僧真學手迹下名報答書疏皆付僧真上觀之笑曰我亦不復能别何敬容署名敬字則大作茍小為文容字大為父陸倕戲曰公家茍既竒大父亦不小北史斛律金不識文字初名敦苦其難署改名為金從其便易猶以為難神武乃指屋角令識之北齊書厙狄干不知書署名乃干字逆上畫之時人謂之穿椎又有武將王周署名先為吉而後成其外世說蕭引書法遒逸陳宣帝嘗指其署名語諸人曰此字筆勢翩翩似鳥之欲飛唐書董昌僭位下制詔皆自署名或曰帝王無押詔昌曰不親署何由知我為天子今人亦謂之花字北齊書後主紀領軍一時二十連判文書各作花字不具姓名莫知誰也東觀餘論云唐人及國初前輩與人書牘或只用押字與名用之無異上表章亦或爾近世遂施押字於檄移或不書己名字而别作形模非也押字法書題名首尾紙縫間曰押縫又曰押尾後人以草記自書曰押字孫公談圃先朝書狀簡尺多用押字非自尊從簡省代名也劉莘老蘇子容得張安道書但著押字不稱名畢文簡與萊公帖尾用押字下加拜咨皆以押字代名按東觀餘論唐文皇令羣臣上奏任用真草惟名不得草遂以草名為花押裝池海嶽書史藏書金題玉躞錦贉繡褫押頭為金題軸心為玉躞贉為卷首綾一名玉池標外加竹界打擫其覆首為標褫法帖譜系云大觀帖用皂鸞鵲錦標褫帙羣碎録云書曰帙者古人書卷外必用帙藏之如今裹袱之類宋真宗取廬山東林寺白居易集命崇文院寫校包以斑竹帙送寺嘗于秀水項氏見王右丞畫一卷外以斑竹帙裹之云是宋物帙如細簾其內襲以薄繒故帙字從巾􅗡縛道書謂一卷為一􅗡音樛與軸同佛書謂之一縛禪學曰多羅樹葉書二百四十縛縛與卷同硯北雜志徐季海題佛經云上第幾隔隔如梵夾也題簽都元敬鐵網珊瑚載逢澤湯允謨云宣和天水雙龍印有方圓二樣法書用圓名畫用方又宣和明昌二帝題簽法書用墨名畫則用泥金裝潢唐六典有裝潢匠注音光上聲謂裝成而以蠟光紙也今多讀作平聲傳國璽秦璽至漢已亡後之僣竊多僞為之其不足重明矣𢎞治中秦中所進上令禮部察驗謂與輟耕録所載秦璽規製不合僅賞軍人毛志學銀五兩天啓時河南撫臣所報上令賫進天子親御文華殿璽貯御前逆閹魏忠賢手捧之憑軒頒示羣臣皆呼萬嵗傳制受賀而罷然巡撫程公紹一疏烺烺千古程公德州人崇禎初起為工部侍郎宋紹聖三年十二月長安村民段義掘地得玉璽正緑色以獻于朝蹇序辰安惇等皆言此秦璽漢以為傳國寶自五代失之今為時而出尋詔禮部御史臺學士院祕書省太常寺議於是蔡京等奏考之璽文皇帝夀昌晉璽也受命于天後魏璽也有德者昌石晉璽也今云受命于天既夀永昌其為秦璽無疑哲宗遂以五月朔御殿受賀改紹聖五年為元符元年此事與天啓朝事極似少司空齊穡公言察哈爾國元之滴派也世雄長西北諸部傳至琳丹汗在位日久忽欲往西域皈佛教其台吉納延等苦諫不聽國中無主太宗皇帝因發兵追降之其尚璽近侍以傳國玊璽倉卒坎地而霾之兵既退有童豎牧羊其地一羊屢至坎所蹄之不已驅之復來牧覺有異試發土則璽見焉聞於官遂進上時天聰某年也今藏御府豫按何文肅喬新集云五代後唐從珂時秦璽燬石敬塘入洛更以玉為之重貴獻之遼興宗試進士遂以有傳國璽者為正統命題金滅遼延禧遺傳國璽於桑乾河元世祖時有札拉爾氏者漁於桑乾之濵得之夜有光監察御史楊桓辨其文以為歷代傳國璽上之至正末中山大兵至燕順帝攜之北遁沙漠其本末如此以文肅言考之自五代之亂璽歸於遼遼歸於金金歸於元在察哈爾國者又二百餘年而歸於本朝詎偶然哉又按王冕詩青象不將傳國璽紫駝空引舊氊房蓋未詳矣印孔琳之建言傳國之璽歷代遞用襲封之印奕世相傳今世惟尉一職獨用一印至於內外羣官每悉遷改尋討其意私所未達愚請衆官即用一印無煩改作按漢書朱買臣還郡邸中稍見其印綬則知自漢以來一官輒易一印矣琳之但言其終年刻鑄喪功消實若今日官府文移案牘唯憑印信使一官一印則僞章日告奸弊百出矣大抵古時文案比今猶省版牘之制此時尚存非若後世關防之多故其習得相沿久而不革也按明初王彞印說古者一官一印居則佩之罷則解之至晉始惜金銀銅炭之費自是衆官皆一印觀琳之此疏恐未然考宋史輿服志熙寧詔自今臣僚所授印亡殁並賜隨葬不即隨葬因而行用者論如律此或其特恩或因事而賜者又宋制凡官府印皆有銅牌刻文云牌出印入印出牌入告身中書所書告身皆佐史體無佳筆隆慶中司馬王崇古以泥金書軸請寶為言者所糾然唐制皆名手書如顔魯公自書告身朱巨川一人而顔魯公徐季海俱為之書巨川賴此以傳至宋即當制者書字兼真行幸得歐蘇便奉為瓌寶紫泥青溪暇筆云晉朝為詔以青紙紫泥紫泥猶今泥金之類蓋泥紫色以書字也豫按漢舊儀天子信璽六皆以武都紫泥封之青囊白素裏兩端無縫西京雜記云漢以武都紫泥為璽室加緑綈其上非以書字也萟林伐山云今之紫泥古謂之芝泥皆濡印染籀之具也姚說誤印章古人如顔魯公輩自書碑間自鐫之故神采不失今之能為書多不能自鐫自書自鐫者獨印章一道耳然其人皆不善書落墨已繆安望其佳其人能行楷能篆籀者所為印多妙不能者類不可觀執此求之百不一爽也蝌蚪大篆今絶矣古鐘鼎上字雜用不得梁千秋刻印章名重一時用字憒憒古篆雜不得𨽻書今人不知也秦人𨽻書今不知者亦以為篆鈍吟雜録宋人間用古篆作印元人尤多變態其式有用古鐘鼎琴樣花葉之類今人皆不行瓢印頗有用者亦隨時可耳唐人名印有學漢法者皆圓潤工緻宋人多徑古元人或失之野今皆以為漢失之矣鈍吟雜録篆法貴古不貴巧漢印白文皆鑄成者但記爵名而已無為字者其篆體亦方正無多轉折至唐用朱文刀刻如有字及道號而印璽之法從此日趨於巧矣然自唐及明隆萬以前書翰家亦不多用印章用者只是銅牙章及黃楊木故講此者頗少今地不愛寶文石肆出好竒之士鐫鑿爭工各以其意相配換無復知有方正體者且專講刀法而漢鑄之體幾亡印章舊尚青田石以燈光為貴三十年來閩壽山石出質溫栗宜鐫刻而五色相映光采四射紅如靺鞨黃如蒸栗白如珂雪時競尚之價與燈光石相埒近斧鑿日久山脉枯竭或以芙蓉山石充之無復寶色其實不及壽山五之一矣二山皆在福州內外各衙門印除武職栁葉篆文餘俱九疊文欽天監厯日則七疊文監察御史八疊文紐上有眼漢官儀吏秩比二千石以上銀印龜紐其文曰章刻曰某官之章二百石以上銅印鼻紐其文曰印刻曰某官之印今士大夫私用圖記曰某章某印全無區别矣刻書刻書咸云始於後唐明宗揮麈餘話云毌丘儉貧賤時借文選于交遊間有難色發憤異日若貴當板鏤之遺學者後仕蜀為宰相遂踐其言刋之印行書籍創見于此事載陶嶽五代史補唐平蜀明宗命太學博士李諤書五經倣其製作刋板于國子監監中印書之始今盛行于天下蜀中為最明清家有諤書印本五經後題長興二年豫考常熟毛氏刻五代史補無此條吳太史任臣十國春秋蜀毋昭裔傳請後主鏤板印九經又令門人句中正孫逢吉書文選初學記白氏六帖刻板行之録誤昭裔為毌丘儉耳刻書始于五代昔人率以為然豫按司空表聖一鳴集有為東都敬愛寺募雕刻律疏印本疏云自洛城乃焚印本漸虞散失欲更雕鎪云云則唐已刻書此其昭昭可據者顧前無引之者何也沈存中云慶厯中有畢升為活字板用膠泥燒成今用木刻字銅板合之表文忌諱元時進賀表文觸忌諱者凡一百六十七字著之典章使人不犯其法良善一百六十七字者極盡歸化亡播晏徂哀奄昧駕遐仙死病苦沒泯滅凶禍傾頽毁偃仆壞破晦刑傷孤墜隳服布孝短夭折災困危亂暴虐昏迷愚老邁改替敗廢寢殺絶忌憂切患衰囚枉棄喪戾空陷厄艱忽除掃擯缺落典憲法奔崩摧殄隕墓槁出祭奠饗享鬼狂藏怪漸愁夢幻弊疾遷塵亢䝉隔離去辭追考板蕩荒古屯師剝革暌違尸叛散慘怨尅反逆害戕殘偏枯眇靈幽沈埋挽升退換移暗了休罷覆弔斷收誅厭諱恤罪辜愆土别逝泉陵此延祐元年十一月取定擬至三年八月寬其禁矣其字樣雖難悉避然亦玉堂視草者所宜知也十七帖述王𢎞撰此帖前人謂皆與周益州者周名撫字道和永和三年桓溫攻成都李勢降以撫代毌丘奧為益州刺史進爵建成公征西都護進鎮西將軍在官三十餘年有惠政卒蜀人廟祀之帖中多言蜀事又按淳化帖有一帖云周益州送此卭竹杖卿尊長或須此今送則此帖謂是與周者可信而中有數帖非與周語來禽帖宋僧邦詩謂與桓宣武楊用修四川志只載八帖是與周則謂此帖皆是與周者亦不然也帖凡二十有七以第一帖首字名篇故曰十七帖張彥逺法書要録云十七帖長一丈二尺即貞觀中內本一百七行九百四十三字是烜赫著名帖也黃長睿東觀餘論云十七帖多臨本永禪師虞世南禇庭誨臨字皆不甚逺故書有數本皆不同南唐李後主勒石澄心堂者乃賀知章臨本宋魏秦家有硬黃本淳熙祕閣續帖亦有刻淳化帖刻多殘缺今世所傳雖非皆右軍真蹟然皆出于右軍要皆不及唐人摹刻帖尾有敕字及虞褚勒定者為佳也山史工書嘗刻華州郭宗昌金石史家藏漢唐以來金石文字甚富古文辭亦嫻雅在關中蓋張藝叟一流人肅府淳化帖肅府淳化閣本自莊王受封太祖賜之宋刻憲王時洮岷道潁川張鶴鳴得李子崇本於白下材官本於臯蘭請肅王賜帖校讎見古法帖數段久缺而兹獨全知為馬房光怪以前物也姑蘇如玉南唐張應台為之雙鈎鶴鳴攜之岑陽憲王乃鐫石於蘭未竟而薨世子識鋐卒鐫於萬厯辛酉先後七年其初榻用太史紙程君房墨人間難得搨工間有私購者直五十千刻用富平石一百四十四葉二百五十三藏府東書園殿鼎革時石幾淪缺順治甲午洮岷道揚州陳卓補刻復成全璧然神明不備視初搨徑庭矣乙卯平凉逆焰及蘭靖逆奮威二將軍自河西來軍於龍尾臯蘭之間攻城不下賊欲破石為炮僞知州徐某力救得免今移置州學有張尚書鶴鳴王尚書鐸憲王父子四跋云定武蘭亭唐太宗留心右軍之蹟因魏徴言蘭亭叙真蹟在僧辨才處特遣御史蕭翼賺得武德四年叙入秦府貞觀十年始命湯普徹馮承素諸葛貞歐陽詢褚遂良各有臨本而歐褚流傳最著後之所謂定武本歐陽臨是也所謂唐絹本褚臨是也定武本當時石刻禁中每紙已值錢數萬逮後石晉之亂契丹輦之而北路棄殺虎林慶厯中李學究得之其子負官緡無償時宋景文守定武乃以帑金代償納石于庫熙寧間薛師正出牧刋一别本以應求者此郡真蹟已有二刻矣其子紹彭字道祖又模之他石潜易古刻又剔損古刻湍流帶右天五字為識大觀中詔向其子嗣昌取龕宣和殿後靖康之亂金人取石鼓及蘭亭叙重氊輦至于燕見宋人姜白石蘭亭考中石鼓在國學而蘭亭不知所在矣今存國學者疑是定州薛師正翻刻本或薛紹彭所刻本雖非古刻然元人不能也此石一云明初出天師庵土中一云元順帝北還重氊裹載棄之于路徐中山取置國學劉餗傳記云蘭亭叙因梁亂流落人間陳天嘉中為僧智永所得至太建中獻之宣帝隋平陳又獻之晉王廣即煬帝也帝不之寶後僧智果從帝借搨及登極竟不從果索果死弟子辨才獲焉文皇為秦王日見搨本驚喜乃貴價市羲之書蘭亭叙終不至及知在辨才處使歐陽詢求得之以武德二年入秦王府由此而觀辨才之師乃智果非智永求蘭亭叙者乃歐陽詢非蕭翼也汝隂王銍性之謂餗父子世為史官是正文字尤精其言當不妄蕭翼之事鄙妄狹陋僅同兒戲文皇始定天下威震萬國尫殘老僧亦何敢靳一紙書或者云辨才所居雲門寺有翼留題二詩秦朝黃三公皆信而不疑此固不足取以為據至若閻立本繪辨才蕭翼圖則出於何延之等傅㑹謂為立本當時之所親見尤非也退翁跋國學蘭亭國學蘭亭為諸家刻本之冠然不知何時入國學或云元順帝北遁棄之中途明太宗取之置太學中又云出天師庵草厰土中國子師取置太學廡下觀其所刻非宋人不能疑為薛道祖所刻換舊石本又云為李學究曽刻一本獻韓忠獻定州去京師不逺元人移至於此也禊帖以定武本為最其真者已如天吳紫鳯不可得見即宋人翻刻諸本在世亦少惟國學一石稱魯靈光此冊乃萬厯以前所搨尤不易得也雲麾將軍碑李北海有兩雲麾碑一為李思訓在陜西一為李秀范陽人唐明皇以功拜雲麾將軍封遼西郡公葬范陽福祿鄉碑刻於天寶元載此碑久貯良鄉庫中不知何時入都城明宛平令李䕃掘地得六礎洗視乃雲麾碑建古墨齊以覆後移少京兆署中止二礎其四礎傳為萬厯末王京兆惟儉移去汴中閣帖石林燕語淳化中嘗出內府及士大夫家所藏漢晉以下古帖集為十卷刻石於祕閣世傳為閣帖是也中間晉宋帖多出王貽永家貽永祁公之子藏名書畫最多真蹟今猶有為李駙馬公照家所得者實為竒蹟而當時摹勒出待詔手筆多疑滯間亦有僞本如李斯書乃李陽氷王密德政碑石本也石後禁中被火焚絳人潘師旦取閣本再摹藏於家為絳本慶厯間劉丞相沆知潭州亦令僧希白摹刻於州廨為潭本絳本雜以五代近世人事微出絳希白自善潭本差能得其行筆意元祐間徐王府又取閣本刻于木板無甚精彩建中靖國初曽丞相布又命劉燾為館職取淳化所遺與近時出者别為續法帖十卷字多作燾體又每下矣硯山齊雜記卷一
