body:
  text: 硯山齋雜記卷四北平孫承澤編墨譜程君房𤣥元靈氣第一陳𤣥墨製様極大𤣥寥天一有時出𤣥元靈氣之上冩經墨次之璧下程君房印一面盤螭上有好品字方于魯青麟髓大墨佳日樓九青麟髓小墨有世寶字第一亦有寥天一元三極墨于魯超世之墨于魯墨用熊胆䑛之苦者佳程彦輔九𤣥三極墨楷書邊微髙羅小華一字少華嘉靖時人即嚴世蕃之食客羅龍文也邵青丘爪墨上有青門遺三字嘉靖以前人極品墨有海陽草書字吳去塵太極圖百子文上盤螭鈕旁有去塵監製字名名望字去塵又名拭吳百昌紫雪上有𤣥枵之精原始之液九轉百煉神明紫雪十六字銘寥天一一而刻𤣥象監製吴𤣥象又作楷書上下作雲頭𤣥象潘方凱石蓮秘寳開天容如韋軒寳藏潄金潘方回宜宜堂潘嘉客客道人方伯闇寫經墨方敷逺碧水神珠程孟陽松圓閣古松煤墨隂有銘陽有孟陽象又有松閣墨大書程孟陽字方澤逺一笏金方廣居神髓宣徳年造長寸許塵不容搰者最佳又有龍鳳大定亦佳物也以上係桐城方密之所列方正牛舌墨冇極品清煙四字嘉靖時人今不可得矣余端蒙上有墨精二字汪仲嘉合造李法墨有百年公孫如石一㸃如漆二語汪仲嘉自造山竈輕煙復古墨上有復古二字汪季常一莖草墨上有萬厯庚戌字葉環源玉髓墨隂書環源陽書玉髓共四字形小而圓又冇方者上有奎星象亦精吳幹古秋葉墨黄賔王龍文雙脊墨萬厯辛亥年製冇放言居士銘紫雲閣藏墨壬寅春製不書姓名吳君章太紫重𤣥墨守𤣥居監製又有天峯神物墨方澹𤣥非煙墨萬厯癸丑製吳喬年知止堂柔翰墨萬厯戊午製圭形詹雲鵬金盤露墨有落花流水形潄金季園墨無姓上有徳藻堂水蒼玉字吳藎卿冩經墨小不盈寸上書心經一卷羣玉册府墨大圓形不書姓名汪美中一莖草墨天啓甲子製吳叔大天琛倣古墨小如筯又有軟劑天琛有倣承晏墨字又有新安上色墨亦天琛上刻𤣥栗齋墨此叔大第一墨也又有雪堂義墨亦刻天琛字徐伯經龍賔墨吳鴻漸潄金青麟髓又有𤣥虬脂為桑林里第一墨吳汝修草𤣥亭墨旁刻庚戌字楷書雙螭嵌珠上有倒香字小圓印潄金吳康虞龍香劑説虎齋藏刻庚戊字灑金嵌珠又有十笏齋墨篆書兩旁萬厯甲辰年製行楷汪儒仲墨皇快雪樓藏有己未楷書字吳肇一觀妙齋墨萬厯壬子楷書潄金嵌珠吳雲卿𤣥玉吳雲卿珍藏八分書方林宗青藜光藴真閣藏歙方林宗為朱太先生珍賞上下雲頭方印林宗二字空賞齋無姓名楷書潄金嵌珠曹和初函一墨有尚友齋印一面刻曹和初製閒道人𤣥精墨一面閒道人三字八分書下冇東岡印落花流水式塗金吳大年爽閣墨一面刻壬戌大年氏藏灑金圓扁濶一寸長倍之倣李法墨一面刻水華居珍藏上壬戌字潄金線邊虚白齋一而刻壬戌年製行書灑金線邊上圓疑亦吳大年也浚明野絃堂藏墨一面崇禎元年楷書圖印有家字方印浚明字吳元養延陵吳元養墨篆書崇禎年造楷書鎮紙式羅小華一池春緑四行書字一面刻盤螭戲水上旁有小華逸史字又水雲居製楷書當朝一品墨花邊上仙人吹簫立鼇首葉向榮文嵩友墨𨽻書下刻葉向榮珍藏有向榮山印一面牡丹雙鳳旁萬厯丙辰年造上大千字楷書赤水珠兩面雙螭盤繞旁刻柔翰齋三篆字上有小銅環當係吴喬年墨𤣥芝墨夀星文一面楷書銘總墨之大凡晉人則有韋誕所云一點如珠者是也六朝則有張永五季則有奚超超之子廷珪在唐賜姓李人稱李廷珪宋有常和沈珪陳瞻張遇以龍香劑進御王迪以逺烟鹿膠而自有龍麝氣稱絶勝焉至潘谷而妙可為廷珪亞至元時有朱萬初者可亞潘谷有蘇浩然名澥者自製墨作松紋皴皮堅緻如玉石又王迪之流也宋徽宗有蘇合油烟墨至金章宗乃以蘇合油搜烟為之價同黄金以上所謂有其名而無其物普天大地欲尋其分寸而不可得者也止雲館寫經墨一面方氏珍藏兩旁彦成専製萬厯丁未明一元造潄金嵌珠必于魯墨也方于魯寥天一有畫一主人方印一面冇汪伯玉銘一面刻建元墨三字于魯舊字也旁冇辛丑字又有瑞元極品墨漆成斷文閣𤣥蟬露精一齋藏上刻辛亥楷書潄金来喜製墨有覺我方印萬厯己未楷書墨首兩旁盤螭如古碑九元三極墨刻建元二字式甚竒古羲蒼篆墨紋麟齋藏方于魯倣易水法造一面刻龍文子封氏督製小字潄金嵌珠方于魯歙人也初名大滶後以字行改字建元以製墨名天下朱竹垞曰古人製墨率用松烟漢取諸扶風晉取諸廬山唐則易州上黨自李超徙歙張谷徙黟皆世其業其後耿仁遂髙慶和戴彦衡吳滋胡智率多歙人明則羅文龍少華邵正已格之程大約君房輩咸以製墨稱而于魯所製最夥上自符璽下至雜珮凡三百八十五式刋成圖譜曽上呈乙覽所造雲箋匪止成都十様嘗以百花香露和墨自作長歌世但目為墨工誤矣竹垞明詩載其二章一送張山人歸越曰雉子斑斑麥正齊黄梅四月雨凄凄新安江上攜尊酒送爾看山到浙西一璞石席上作曰十年不慣出家門千里來逢故舊存正值江干春未晚蔞蒿荻笋煮河豚固自楚楚有致也按于魯有佳日樓詩集梅季豹評其有唐人風汪伯玉曽招之入豐干社屠緯真謂其尊函叟而詩不盡禀函叟葢布衣中一雅宗也古之名人為技所掩獨一于魯哉吳拭字去塵休寧人徐武子稱其慷慨重然諾中年以結客傾其家晚棲吴市尋避兵虞山困厄死其詩自出機杼决不冺没朱子蓉述其夙饒於貲破産結客游金陵徧題十寺廊壁如花雨已過寒食後風筝又傍社壇斜蠻鄉有夢三千里閩海無書二十年半偈嵗深香積飯一畨春老木綿衣移家轉近寒山寺探篋惟存秋水篇衣上露涼飄桕葉鬢邊霜重壓蘆花誦之神采奪目又稱其製糜丸不啻沈珪對膠邵正已字格之休寧人以製墨名於世所謂青丘山人者也所著有立石山房草朱竹垞曰格之専精墨務詩亦斐然其銅雀臺詩云寂寂銅雀望飄飄繐帳懸君王遺令日是妾斷腸年舞影傷羅綺歌聲咽管絃西陵松檟冷日夕鎻寒烟著語固不自俗信乎隃麋松烟非墨工所能製也宋弇山墨品曰世重李廷珪墨以其烟輕色明潤若㸃漆嵗久不黯不碎故古今無匹也傳其製法以燈草一莖用紅花膏染就置盞中注蘇合油燃之故烟清而無煤氣製鹿角膠和烟雜冰片龍腦杵萬杵而成其墨外不加漆當時已計兩準價盖其工料精良皆出自大官非他家私製可能方擬者也南唐既亡歸宋内庫宋祖不知寳惜修大内工作以之代煤而廷珪之佳製殫矣宋之中葉士大夫家偶有藏者已為希世之寳矣宋代潘谷墨次於廷珪世亦貴重潘法不傳但聞其注油取烟和膠製料悉以己意為之不用作墨家常法故東坡先生平生惟用潘墨而所藏亦多後遷海外舟敗於水而潘墨盡焉明世有羅小華製小道士一種其烟極清落紙有潤色不事香料而亦無膠氣真絶品也次則程君房取烟甚輕製膠得法不用金珠冰腦屑有本色與施漆二種本色宜南施漆宜北盖北土風髙不施漆懼中斷且裂也世共珍之次則有方于魯其墨品在君房之下烟微濃微重著紙頗有色澤盖其取烟以松取油用桐而膠則不免雜皮耳然世亦重之明晚則有程鳳池吳去塵頡頏後先其製烟施油和膠入料一一中窽概於本色外不加漆頗稱適用與時製逈殊亦妙品也近時作者叠出不用古法惟以新意創造雖香澤有餘而神采殊失矣書畫家折衷諸品李潘不可再遇小華亦殊難得惟以程方二氏為上品也豐潤曹冠五太守名鼎望順治己亥進士選庶常改部屬出守徽州俸額所入悉以製墨其次子賔及舍人名鈖者博雅好亊亦有所製較太守為亞之徳州孫莪山先生使黔日記中有得江津石硯詩云我有曹氏墨一金易一銖盖指太守父子也頃見有誤讀此詩者遂以新安曹素功墨當之不覺失笑莪山之詩為素功增利市三倍矣程君房名大約字博初名大滶改字建元焦弱侯謂其博雅能詩文又稱君房為鴻臚想以墨授官耶池北偶談宣城梅清嘗遺予墨朴一其堅如石文曰程燎松丸墨起於唐王方翼少孤被母逐居鳳泉里執苦養親以墨致富後為名臣南唐徐常侍鉉言嘗得李超墨一挺長不過尺細才如筯與弟鍇共用之日書約五千字十年乃盡超與常侍同時其珍重已如此宜北宋諸公得其斷璧殘圭以為希有也宋時士大夫多重兖墨范宣公有詩云誰爇長松製作勤輕煤勻膩雜蘭薰中疑𤣥石無纎翳外似靈犀有宻紋溪石乍研浮紫翠蜀牋試冩落煙雲㑹將㸃畫傳青簡千古忠邪為爾分元有朱萬初善製墨純用松煙盖取三百年摧朽之餘精英之不可冺者用之非常松也天厯己巳開奎章閣揀儒臣親侍翰墨榮公存初康里公子山皆侍閣下以朱萬初所製墨進大稱㫖虞文靖公贈之詩曰霜雪摧殘澗壑非深根千嵗斧斤違寸心不作飛煙化還作元雲繞紫微眼鏡眼鏡初入中國名曰靉靆惟一鏡之貴價準匹馬今則三五分可得然不過山東米汁燒料玻瓈者貴矣水晶尤貴水晶之墨色者貴至七八金餘值以漸而減真讀書之一助也西洋天主教人神竒其説云自萬厯年中彼教入中國始有者非也偶見吳匏翁詩集中有謝屠公送西域眼鏡篇曰眼鏡從何來異哉不可詰圓與莢錢同净與雲母匹又若台星然兩比半天出持之近眼眶偏宜對書帙蠅頭𤨏細字明瑩類椽筆余生抱書淫視短苦目疾及兹佐吏曹文案夕未畢太宰定知我投贈不待乞一朝忽得此舊疾覺頓失謝却撥雲膏生白訝虚室扁鵲見五臟未必有竒術隨身或得此遂使目光溢世傳離婁明雙睛不能没千年黄壤間化此直百鎰聞之西域産其名殊不一博物有張華吾當從彼質觀此鏡之形模畢具又知文定公目近視所云産西域則文定之為吏侍當在𢎞治正徳間彼時中國久有此鏡矣何待天主教始能造也留青日札提學副使潮陽林公有二物如大錢形質薄而透明如硝子石如琉璃色如雲母每目力昏倦不辨細書以此掩目精神不散筆畫倍明中用綾絹聨之縛於腦後人皆不識舉以問余余曰此靉靆也出於西域滿剌國或問公得自南海賈胡後見張公方洲雜錄云宣廟賜胡宗伯物即此以金相輪廓而衍之為柄紐制其末合則為一岐則為二如市肆中等子匣又孫參政景章亦有一具云以良馬易得於西域似聞其名為僾逮則其二字之訛也盖靉靆乃輕雲貌言如輕雲之籠日月不掩其明也若作曖曃亦可宣鑪注如臯冒辟疆博雅嗜古嘗為桐城方詹事拱乾賦宣鑪歌自為之注甚精核云宣鑪最妙在色假色外炫真色内融從黯淡中發竒光爇火久燦爛善變久不著火即納之汙泥中拭去如故假者雖火養數十年脱則枯槁宣廟時内佛殿火金銀銅像渾而液又云寳藏焚金銀珠寳與銅俱結命鑄鑪宣廟詢鑄工銅幾煉始精工對以六火則殊光寳色現上命煉十二火條之復用赤火鎔條於鋼鐵篩格上取其極清先滴下者為鑪存格上者製他器鑪式不規規三代鼎鬲多取宋瓷鑪式仿之宣鑪以百摺彝乳足花邊魚鰍蜒蚰諸耳薰冠象鼻石榴足橘囊香奩花素方員鼎為最索耳分襠判官耳角端象鬲雞脚扁畨環六稜四方直脚漏空桶竹節等為下宣鑪仿宋燒斑初年沿永樂鑪製中年嫌其掩鑪本質用番鹵浸擦薫洗易為茶蠟末年愈顯本色著色更淡後人評宣鑪五等色栗殻茄皮棠棃褐色而藏經紙色為第一金鎏腹下為湧祥雲金鎏口下為覆祥雲鷄皮色覆手色火氣久而成也嘉靖後之學道近之施家皆北鑄北鑄間用宣銅器改鑄銅非清液又小冶寒儉無精采且施不如學道多矣南鑄以蔡家勝甘家蔡之魚耳可方學道真宣鑪本色之厄有二嘉隆前尚燒斑有取本色真者重燒有過求本色之露如末年淡色取本色真鑪磨治一新甚有嵗一再磨景泰成化之獅頭彞鑪等後人偽易鑿宣欵以重其價宣鑪又有呈様無欵最真妙者後人得之以無欵恐俗目生疑取宣别器有欵者鑿嵌畢竟㾗跡難冺皆宣之厄也明宣廟銅器鑪為首其製不一有彞鑪乳鑪花邊天雞橘囊壓經香奩角端象鬲匾鑪畨環六棱纓絡梵書太極桶鑪竹節馬蹄法盞盋盂馬槽熏冠等式口有燈草邊花觚直口平口瓮口井耳有橋耳魚耳冲天魚耳鰌耳鵬耳畨象冲天畨象海獅龍鳳天鷄䕫龍螭虎結耳如意風箱索耳寛緊鸚鵡耳環耳朝冠㦸耳蜒蚰香草夀帶鳥獸吞口肩有金蓮寳相雲肩線肩所取者橋耳乳足魚耳石榴足鰌耳圏足畨象及鵬耳天鷄海獅獸耳亦圏足或裙足香草髙乳髙㦸耳石榴足橋耳有三丁戈足其品最上次取者法盞波斯足鸚鵡象首湯盬足壓經環耳低乳足香餅足索耳有寛𦂳足有髙低者寛昂於𦂳最下桶鑪雲板足湯盬足薰冠馬槽盋盂鑄耳多仿宋瓷欵識有身耳逼近無餘地者乃另鑄耳磨治釘入釘耳多偽盖宣鑪鑄耳不稱率㨂出更鑄十不存一色種種皆仿宋燒斑者初年色也永樂燒斑本此蠟茶本色者中年色也謂燒斑掩銅質之精華乃尚本色用畨磠同醋浸擦為之本色愈淡者末年色也純用本質燒成色愈淡而愈精采其色有赤金色三種石榴皮棠棃秋白棃栗殻海棠紅山查白棗皮紅淺深藏經紙茄皮羯色其最淺藏經山查白海棠紅秋白棃其次鎏金色鎏左肩為覆祥雲腹以下為涌祥雲至於雞皮色則火氣久而自成跡似雞皮摸之無跡即今所謂橘皮紋也本色之厄有二嘉隆前有燒斑色時尚燒斑故取本色鑪重加燒斑近則磨新厄過求色淺磨治一新至有嵗再磨者欵識隂印陽文真書大明宣徳年製字完整地明潤與鑪色同非經彫鑿熏造者後有偽造者北鑄嘉靖初之學道前近之施家施不如學道前間用宣銅别器改鑄然别器銅質原次於鑪且小冶單鑄氣寒儉乏精華蘇鑄蔡家南鑄甘家甘不如蔡惟魚耳一種可方學道有舊鑪偽欵者永樂之燒斑彞耳多寛索腹多分襠景泰成化間之獅頭彞等厚赤金化雲鳥片帖鑄原欵用藥燒景泰年製等字有真鑪真欵而嵌釘者當年監造每種成不敢鑄欵呈上準用方依欵鑄後謂有欵易售取宣别器欵色配者嵌入其合縫在欵隅邊際但從覆手審視自得㾗影故首視官造民造官造任其花素無不工雅華而不妖樸而不陋極草率處偏耐看玩官鑄分兩無零剰錢數民鑄不然純是琢磨車碾之精雖窮極工巧自乏大家規則宣鑪惟色不能偽黯然竒光在裏望之如至柔之物可以挼搯廹視如膚有肉色藴火爇之精采善變偽者外光奪目内質理槁然矣傳宣廟時佛殿災金銀銅像液因用鑄器非也宣廟欲鑄鑪問工何法煉而佳工奏煉至六用鑪甘石點則現寳光殊色異恒用矣上曰煉十二煉足條之置鋼鐵篩格上用赤炭鎔之清者先滴備鑄存格上者作他器窑器窑器所傳柴禹官哥鈞定可勿論矣在勝朝則有永宣成𢎞正嘉隆萬官窑其品之髙下首成窑次宣次永次嘉其正𢎞隆萬間亦有佳者其土骨紫白料法也堊藥水法也厎足火法也花青彩畫法也所忌者三􅣅澤不具曰骨罅折曰蔑邊毁剥曰茅成窑之草蟲可口子母鷄勸杯人物蓮子酒盞草蟲小琖青花小盞其質細薄如紙蒲萄􅧥杯五色敞口匾肚齊箸小碟香合小罐皆五采者成杯茶貴於酒采貴於青其最者鬭鷄可口謂之鷄缸神宗時尚食御前成杯一雙已值錢十萬成宣􅧥杯皆非所貴宣窑之祭紅杯盤有通體紅者有紅魚者百果者有西紅寳石堊塗燒者其寳光凸起紫黑者火候失也青花有茶􅧥杯畫龍及松梅有酒􅧥杯畫人物海獸硃砂祭紅少大器壺物有色紅鮮白鎻口者有竹節滷壺小壺匾罐皆罩盖者鑪缾杯碟敞口花尊蜜漬桶罐多五采者白壇盞心有壇字暗花白茶琖瓮肚釡厎線足裏有龍鳳暗花厎有大明宣徳年製暗欵坐墩有漏花填采皆深青地有藍地填采有白地青花有冰裂紋其形以拱面為上凹面次之為其積水故也又以花欵青堊光素品者次之水注有五采桃注石榴注采色雙𤓰注雙鴛注鵞注筆洗有魚藻洗葵洗罄口洗螭洗雨臺鐙檠幡幢雀食罐蟋蟀盆徐應秋曰宣窑不獨欵式端正色澤細潤即其字畫亦精絶嘗見一茶盞乃畫輕羅小扇撲流螢其人物毫髪具備儼然一幅李思訓畫永窑之壓手杯傳用可久撆口折腰沙足滑厎外深青花内雙獅毬毬内篆書永樂年製細如粟米鴛鴦心次之近倣蠢厚約略形似耳嘉窑泡杯其極低小罄口者有三青花者稱最水藻者次之芝草者又次之壇琖大中小三號内茶字者為最橄欖字酒字棗湯字次之薑湯字又次之薑湯不恒有琖色以正白如玉斯羙堊嫩則近青堊不净則近黄其青花五色二窑器製悉備有三色魚匾殘罄口饅心圓足紅鉛小花合子等有大如錢有青花有紅花盖永尚厚成尚薄宣青尚淡嘉青尚濃成青為蘓渤泥宣青名麻葉青宣采未若成采淺深入畫也嘉萬之回青特為幽菁鮮紅土絶正礬紅而回青盛作隆窑之秘戲不入鑒藏他物汁水瑩厚如堆脂汁故名鷄皮橘皮質料厚實不易茅蔑也官窑坯器乾經年方用車碾薄上堊水候乾數次故入骨最堅而厚出火口足堊不滿者則碾去土堊更燒之故有鷄橘紋起用久口不茅身不蔑其發椶眼蟹爪紋者堊中心小疵反以諗火候之到亦如宣鑪熱銃他鑄無及者至於别見他産者略於後彭窑元時戧金匠彭均寳效古定器製折腰様者甚佳土脈細白者與定器相似青口欠滋潤極䯳脆稱為新定近景徳倣者用青田石粉為骨燒造名為粉定堊粗骨䯳更不佳龍泉窑出浙江處州龍泉縣與哥窑共一地道宋時名曰青瓷明窑移處州府處州青色土堊火候較舊龍泉質劣古器質薄一種盤厎有雙魚外有銅掇環體厚者不佳象窑出浙江寧波府象山縣似定而粗色帶黄有蟹爪紋色白滋潤者髙俱不貴歐窑出南直常州府宜興縣明歐姓者燒造有倣哥窑紋片者有倣官均窑色者采色甚多皆花盤匳架諸器不一舊者頗佳建窑出福建泉州府徳化縣其色有甜白青色深淺不同古建瓷薄者絶類宋瓷盌盞多是撆口色黒滋潤有黄免斑滴珠大者真體厚者多少見薄者惟佛像最佳饒器出江西饒州府浮梁縣景徳鎮及廣信府弋陽縣宋時器色様甚繁其淋堊甚肥靈透與定相近而稍有異明官窑皆出於此其官造窑小而器不多甚至一窑止燒一器者盖取火候和勻周宻而無攲斜走烟破嚳之失祭紅以西紅寳石為堊又有硃砂㸃翠青花點色不同堊肥俱有橘皮紋甜白一種色如羊脂者尤可愛重堊不到磨去復上入窑再燒故椶紋甚厚久用而不茅蔑御土窑體薄而潤最好素折腰様茅口者體薄色潤瑩白尤佳其值低於定器元時燒小定印花者内有樞府字者髙新燒大足素者欠潤有青色及五色花者今燒此器佳者色白而瑩最髙青黒色戧金者多是酒壺酒盞之屬吉窑出江西吉州府廬陵縣永和鎮色與紫定相類體厚而質粗不足貴宋時有五窑書公燒者佳有白紫二色花缾大者直數金小者有花又有碎器亦佳相傳文丞相過此窑器盡變成玉遂止不燒山西窑出太原府榆次縣平定州平陽府霍州又出霍器陜窑出平涼府平涼華亭兩縣廣東窑出潮州府其器與饒器類髙麗窑器類饒産有甜白色而堊乾燥微近黄皮粗骨輕花素不等細花竟似北定印花青色者似龍泉上有白花朶者不甚佳大食國器以銅骨為身起線填五采藥料燒成俗謂法瑯是也宋官窑色鮮菁可愛明官窑亦佳又謂之鬼國古瓷器出河南彰徳府磁州與定器相似但無淚㾗亦有劃花繡花素者值昻於定新者不足論也居易録萬厯間浮梁人昊十九者自號壺隠隠於陶能詩書似趙承㫖所製磁器妙極人巧嘗作卵幕杯瑩白可愛一枚重纔半銖性不嗜利所居席門罋牖而已樊玉衡贈詩云宣窑薄甚永窑厚天下知名昊十九更有小詩清動人匡廬山下重回首李日華詩云為覔丹砂到市㕓松聲雲影自壺天憑君㸃出流霞盞去汎蘭亭九曲泉宋牧仲中丞最好古銅器在江右予嘗寄訊訪昊所製不可得矣髙江村酬蒼林宋均窑缾歌古來窑器崇樸質瓦甖土缶無竒特越窑傳自李唐開陸魯望詩云九秋風露越窑開奪得千峯秘色來則唐時已有窑器矣青瓷共寳柴皇式世傳柴窑色如天聲如磬今人得其碎片皆以裝飾玩具雅具偏從趙宋多錦邊白定嫌芒棘勅使新窑建汝州熊熊瑪瑙流光澤宋以白定有芒不堪用命汝州建青窑器以瑪瑙末為油渡江邵局襲故京澄泥笵土何輕明燒成惟獻至尊用鄭重特以官窑名南渡後邵成章提舉後苑號邵局法政和間京師舊製名官窑進奉之物臣庶不敢用處州二章巧更過生一新興百圾破南宋時處州龍泉章生一生二各主一窑兄陶者為哥弟陶者為龍泉足皆銕色哥窑多斷紋名百圾破更見重於世一器爭酬數十緡阿弟龍泉名並播近來纎羙説宣城麗彩寒芒照四坐寳椀雞缸盤積音祭紅市中論價稱竒貨雞缸寶燒碗硃砂盤最為精緻價在宋磁上僧寮偶見雙耳瓶黛色濃淡光泠泠異哉均州舊時造幾經兵燹猶完形蒼公為言出内府亂離遺棄等塵土當今所寳惟蒸民焚裘裂錦輕圖譜不爾搜求焉得存此物早同簋簠尊宣和間内府尚古器搜求民間無敢隠者禪家本意絶貪愛贈君持去娱朝昏雨過秋天白露時小齋䬃䬃凉颸吹題詩燈前記佳話紙窻木榻生陸離京師地鹵艱花木花開花謝空寒燠得此大足消清愁殷勤滿挿東籬菊成窑鷄缸歌世人耳目貴所少龍勺鷄彝競愛寳杯樽本是太古風近時誰信趨竒巧趙宋花瓷價最髙玉腴珠潤堅不佻永樂以來制稍變宣磁益復崇纎妖血色硃盤日輪射小盞青花細描畫後來埏埴日更精五采紛綸數成化紅粧嬝娜蠟泪垂萬花錦谷揚葳㽔春隂隔院鞦韆動濃香滿架葡萄披亦有嬰兒與髙士鬢眉栩栩神相似成窑酒杯種類甚多有名髙燒銀燭照紅粧者一美人持燭照海棠也錦灰堆者折枝花果堆四面也鞦韆杯者士女戲鞦韆也龍舟杯者鬬龍舟也髙士杯者一面畫周茂叔愛蓮一面畫陶淵明對菊也娃娃杯者五嬰兒相戲也滿架葡萄者畫葡萄也其餘香草魚藻瓜茄八吉祥優鉢羅花西番蓮梵書名式不一皆描畫精工㸃色深淺磁色瑩潔而質堅留與人間作秘珍什襲真堪琬琰比尤其著者推鷄缸陸離寳色搖睛牕䑕姑灼灼老鷄喚鷄缸鷄畫牡丹下有子母躍躍欲動將雛抱鷇三兩雙梅邨老翁稱解事錯道宣宗製此器梅邨作宣宗戧金蟋蟀盆歌以鷄缸為宣窑此器繇來見者稀更有何人討源始相公愛玩逾圖球長安好事勤徴搜綈函封固獻閣下千緡一器争相酬我從平津得暫見兩手摩挲眼光眩歸來倒盡老瓦盆一醉那分貴與賤漢書南山有武帝舊匋匋即窑也當以此為正書硯山齋雜記卷四
